<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo Alcoi - Càrrecs 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap');
        .font-festes { font-family: 'Cinzel', serif; }
        .bg-alcoy-dark { background-color: #020617; }
        .card-glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-alcoy-dark text-slate-200 min-h-screen">

    <div class="max-w-md mx-auto p-4 pb-20">
        
        <header class="relative rounded-3xl overflow-hidden mb-6 shadow-2xl border-2 border-yellow-600/30">
            <img src="https://www.asjordi.org/upload/images/asociacion/organizacion/01-Llana.jpg" class="w-full h-48 object-cover opacity-60">
            <div class="absolute inset-0 bg-gradient-to-t from-alcoy-dark to-transparent"></div>
            <div class="absolute bottom-4 left-0 right-0 text-center">
                <h1 class="font-festes text-3xl text-white tracking-widest drop-shadow-lg">METEO ALCOI 2026</h1>
                <p class="text-[10px] font-bold text-yellow-500 uppercase tracking-[0.3em]">750 Aniversari de la Aparició</p>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card-glass p-5 rounded-[2rem] text-center border-l-4 border-l-sky-500">
                <span class="text-[9px] uppercase font-black text-slate-500 tracking-wider">Temperatura</span>
                <p class="text-4xl font-black text-white italic"><span id="temp">--</span>°</p>
            </div>
            <div class="card-glass p-5 rounded-[2rem] text-center border-l-4 border-l-emerald-500">
                <span class="text-[9px] uppercase font-black text-slate-500 tracking-wider">Humitat</span>
                <p class="text-4xl font-black text-white italic"><span id="hum">--</span>%</p>
            </div>
        </div>

        <h2 class="font-festes text-center text-yellow-600 mb-6 text-xl italic uppercase tracking-widest">Previsió de la Trilogia</h2>
        <div id="contenedor-fiestas" class="space-y-6">
            </div>

        <div class="mt-10 mb-6">
            <h3 class="text-center text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Anàlisi d'Ensembles (Rames)</h3>
            <div class="rounded-3xl overflow-hidden border border-slate-700 shadow-2xl">
                <img id="mapa" src="" class="w-full">
            </div>
        </div>

        <footer class="text-center opacity-40 py-8">
            <p class="text-[8px] font-bold uppercase tracking-widest">Dades actualitzades: <span id="fecha">--</span></p>
        </footer>
    </div>

    <script>
        // Mapeo de fotos de cargos
        const fotosCarrecs = {
            "2026-04-24": "https://www.asjordi.org/upload/images/asociacion/01-ANDALUCES.jpg", // Capità C
            "2026-04-25": "https://www.asjordi.org/upload/images/asociacion/organizacion/01-Llana.jpg", // Sant Jordiet
            "2026-04-26": "https://www.asjordi.org/upload/images/filaes/02-Asturianos.jpg", // Alferes C
            "2026-04-27": "https://www.asjordi.org/upload/images/filaes/MARRAKESH.jpg" // Capità M (para rellenar)
        };

        async function updateApp() {
            try {
                const res = await fetch('datos.json?v=' + Date.now());
                const data = await res.json();

                document.getElementById('temp').innerText = data.temp;
                document.getElementById('hum').innerText = data.hum;
                document.getElementById('mapa').src = data.mapa_url;
                document.getElementById('fecha').innerText = new Date(data.fecha).toLocaleString('es-ES');

                const container = document.getElementById('contenedor-fiestas');
                container.innerHTML = '';
                
                data.fiestas.forEach(f => {
                    const card = `
                        <div class="card-glass rounded-[2rem] overflow-hidden shadow-xl border-t border-white/10">
                            <div class="relative h-28">
                                <img src="${fotosCarrecs[f.fecha] || ''}" class="w-full h-full object-cover opacity-80">
                                <div class="absolute inset-0 bg-gradient-to-r from-slate-900 to-transparent"></div>
                                <div class="absolute top-4 left-5">
                                    <span class="block text-[10px] font-black text-yellow-500 uppercase">${f.dia.split(' - ')[0]}</span>
                                    <span class="block text-lg font-festes text-white leading-tight">${f.dia.split(' - ')[1]}</span>
                                </div>
                                <div class="absolute top-4 right-5 text-right">
                                    <span class="text-2xl">${f.icono}</span>
                                    <span class="block text-sm font-black text-white">${f.temp_max}°C</span>
                                </div>
                            </div>
                            <div class="p-4 bg-slate-900/40">
                                <div class="flex justify-between text-[10px] font-bold mb-3 text-slate-400 uppercase tracking-widest border-b border-slate-700 pb-2">
                                    <span>Prob: ${f.prob}</span>
                                    <span>Precip: ${f.litros}</span>
                                </div>
                                <p class="text-[11px] leading-relaxed text-slate-300 italic">
                                    <span class="text-sky-400 font-bold">Nota de l'expert:</span> ${f.analisis_tecnico}
                                </p>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (e) { console.error(e); }
        }
        updateApp();
    </script>
</body>
</html>
