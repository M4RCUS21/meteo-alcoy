            const [s, setS] = useState(0);

            useEffect(() => {
                const target = new Date("2026-04-24T00:00:00").getTime();
                const calc = () => {
                    const diff = target - Date.now();
                    if(diff <= 0) return null;
                    const secs = Math.floor((diff/1000)%60);
                    setS(secs); // For animation trigger
                    return { d: Math.floor(diff/86400000), h: Math.floor((diff/3600000)%24), m: Math.floor((diff/60000)%60), s: secs };
                };
                setRem(calc());
                const id = setInterval(() => setRem(calc()), 1000);
                return () => clearInterval(id);
            }, []);

            if(!rem) return h('div', {className: "text-2xl font-serif italic text-[var(--accent-gold)] mt-8"}, t.cd.done);

            const blocks = [ {v:rem.d, l:t.cd.d}, {v:rem.h, l:t.cd.h}, {v:rem.m, l:t.cd.m}, {v:rem.s, l:t.cd.s, isS:true} ];

            useEffect(() => {
                if(!aRef.current) return;
                aRef.current.src = PLAYLIST[cur].file;
                aRef.current.volume = muted ? 0 : volume;
                if(isPlaying) {
                    aRef.current.play().then(() => {
                        setToast(true); setTimeout(()=>setToast(false), 4000);
                    }).catch(()=>{});
                }
            }, [cur, isPlaying]);

            useEffect(() => { if(aRef.current) aRef.current.volume = muted ? 0 : volume; }, [volume, muted]);

            // First interaction play
            useEffect(() => {
                const init = () => {
                    if(!isPlaying && aRef.current) {
                        aRef.current.play().then(() => { setPlaying(true); setToast(true); setTimeout(()=>setToast(false),4000); }).catch(()=>{});
                    }
                    window.removeEventListener('click', init);
                };
                window.addEventListener('click', init);
                return () => window.removeEventListener('click', init);
            }, [isPlaying]);

            return h(React.Fragment, null,

                                h("img", {src:f.img, className: "w-16 h-16 rounded-xl object-cover border border-[var(--card-border)]"}),
                                h("div", null, h("div", {className: "text-[0.6rem] font-bold text-[var(--accent-gold)] uppercase tracking-widest"}, f.cargo), h("div", {className: "font-serif text-xl font-bold text-[var(--text)]"}, f.nom))
                            ))
                        ),
                        // Moros
                        h("div", {className: "bg-[var(--card-bg)] border border-[var(--card-border)] rounded-2xl p-8"},
                            h("h3", {className: "font-serif text-2xl font-bold text-[var(--moro-green)] mb-6 border-b border-[var(--card-border)] pb-4"}, t.cargos.m),
                            FILAES.filter(f=>f.cargo && f.tipus==='moro').map((f,i) => h("div", {key:i, className: "flex items-center gap-4 mb-4"},
                                h("img", {src:f.img, className: "w-16 h-16 rounded-xl object-cover border border-[var(--card-border)]"}),
                                h("div", null, h("div", {className: "text-[0.6rem] font-bold text-[var(--accent-gold)] uppercase tracking-widest"}, f.cargo), h("div", {className: "font-serif text-xl font-bold text-[var(--text)]"}, f.nom))
                            ))
                        )
                    )
                )
            );
        }

        function FilaesSection({ t }) {
            return h("section", {id: "filaes", className: "py-24"},
                h("div", {className: "max-w-7xl mx-auto px-6"},
                    h(FadeIn, null, h("div", {className: "text-center mb-16"}, h("div", {className: "sec-lbl"}, "14 Cristianas · 14 Moras"), h("h2", {className: "sec-ttl"}, t.fil.ttl1, h("em", null, t.fil.ttl2)))),
                    h("div", {className: "grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-4"},
                        FILAES.map((f,i) => h(motion.div, {key:f.nom, className: "fcard", initial:{opacity:0, scale:0.9}, whileInView:{opacity:1, scale:1}, viewport:{once:true}, transition:{delay:i*0.02}},
                            h("div", {className: `f-band-badge ${f.tipus==='cristia'?'f-band-c':'f-band-m'}`}, f.tipus==='cristia'?'C':'M'),
                            h("img", {src: f.img, className: "w-full aspect-[3/4] object-cover"}),
                            h("div", {className: "p-3 text-center bg-[var(--card-bg)]"}, h("div", {className: "text-[0.6rem] font-bold text-[var(--text)] uppercase tracking-wider"}, f.nom))
                        ))
                    )
                )
            );
        }

        /* ═══════════════════════════════════════════
           7. APP ROOT
        ═══════════════════════════════════════════ */
        function App() {
            const [theme, setTheme] = useState("light");
            const [lang, setLang] = useState("ca");
            const [isPlaying, setPlaying] = useState(false);
            const [cur, setCur] = useState(0);
            const [volume, setVolume] = useState(0.5);
            const [muted, setMuted] = useState(false);

            const toggleTheme = useCallback(() => {
                setTheme(prev => {
                    const n = prev === "light" ? "dark" : "light";
                    document.body.className = n;
                    return n;
                });
            }, []);

            const nextTrack = useCallback(() => setCur(c => (c+1)%PLAYLIST.length), []);
            const t = I18N[lang] || I18N.ca;

            return h(ThemeCtx.Provider, {value: {theme, toggleTheme}},
                h(LangCtx.Provider, {value: {lang, setLang}},
                    h(AudioCtx.Provider, {value: {isPlaying, setPlaying, cur, nextTrack, volume, setVolume, muted, setMuted}},
                        h(React.Fragment, null,
                            h(Navbar, { t }),
                            h(Hero, { t }),
                            h("div", {className: "gold-div"}),
                            h(MeteoSection, { t }),
                            h("div", {className: "gold-div"}),
                            h(CargosSection, { t }),
                            h("div", {className: "gold-div"}),
                            h(FilaesSection, { t }),
                            h(AudioPlayer, { t })
                        )
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
</body>
</html>
