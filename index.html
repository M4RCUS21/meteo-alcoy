      const FESTA_TARGET = new Date("2026-04-24T00:00:00");
      function Countdown() {
        const calc = useCallback(() => {
          const d = FESTA_TARGET - Date.now();
          if (d <= 0) return null;
          return {
            dies: Math.floor(d / 864e5) + 1,
            hores: Math.floor((d / 36e5) % 24),
            minuts: Math.floor((d / 6e4) % 60),
            segons: Math.floor((d / 1e3) % 60),
          };
        }, []);
        const [rem, setRem] = useState(calc);
        useEffect(() => {
          const id = setInterval(() => setRem(calc()), 1000);
          return () => clearInterval(id);
        }, [calc]);
        if (!rem)
          return h(
            "div",
            {
              style: {
                fontFamily: "Playfair Display,serif",
                fontStyle: "italic",
                color: "rgba(255,255,255,0.9)",
                fontSize: "clamp(1rem,3vw,1.4rem)",
                margin: "20px 0 26px",
              },
            },
            "Les Festes han Començat!",
          );
        const units = [
          { v: rem.dies, l: "Dies" },
          { v: rem.hores, l: "Hores" },
          { v: rem.minuts, l: "Minuts" },
          { v: rem.segons, l: "Segons" },
        ];
        return h(
          "div",
          { className: "cd-wrap" },
          units.map((u, i) =>
            h(
              React.Fragment,
              { key: u.l },
              h(
                "div",
                { className: "cd-block" },
                h(
                  "div",
                  { className: `cd-num ${i === 3 ? "cd-block-seg" : ""}` },
                  String(u.v).padStart(2, "0"),
                ),
                h("div", { className: "cd-lbl" }, u.l),
              ),
              i < 3 && h("div", { className: "cd-sep" }, ":"),
            ),
          ),
        );
      }

      function App() {
        const [theme, setTheme] = useState("light");
        const toggleTheme = useCallback(() => {
          setTheme((t) => {
            const next = t === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", next);
            return next;
          });
        }, []);
        const [lang, setLang] = useState("ca");
        const [scrolled, setScrolled] = useState(false);
        useEffect(() => {
          const fn = () => setScrolled(window.scrollY > 60);
          window.addEventListener("scroll", fn, { passive: true });
          return () => window.removeEventListener("scroll", fn);
        }, []);
        const [isPlaying, setPlaying] = useState(false);
        const [cur, setCur] = useState(0);
        const [volume, setVolume] = useState(1);
        const [muted, setMuted] = useState(false);
        const audioRef = useRef(null);
        useEffect(() => {
          audioRef.current = new Audio(PLAYLIST[0].file);
          audioRef.current.loop = false;
          audioRef.current.addEventListener("ended", () =>
            setCur((c) => (c + 1) % PLAYLIST.length),
          );
          return () => audioRef.current?.pause();
        }, []);
        useEffect(() => {
          if (!audioRef.current) return;
          audioRef.current.src = PLAYLIST[cur].file;
          if (isPlaying) audioRef.current.play().catch(() => setPlaying(false));
        }, [cur]);
        useEffect(() => {
          if (!audioRef.current) return;
          if (isPlaying) audioRef.current.play().catch(() => setPlaying(false));
          else audioRef.current.pause();
        }, [isPlaying]);
        useEffect(() => {
          if (audioRef.current) audioRef.current.volume = muted ? 0 : volume;
        }, [volume, muted]);
        const nextTrack = useCallback(
          () => setCur((c) => (c + 1) % PLAYLIST.length),
          [],
        );
        return h(
          ThemeCtx.Provider,
          { value: { theme, toggleTheme } },
          h(
            LangCtx.Provider,
            { value: { lang, setLang } },
            h(
              AudioCtx.Provider,
              {
                value: {
                  isPlaying,
                  setPlaying,
                  cur,
                  nextTrack,
                  volume,
                  setVolume,
                  muted,
                  setMuted,
                },
              },
              h(
                React.Fragment,
                null,
                h(AudioPlayer),
                h(Navbar, { scrolled }),
                h(
                  "main",
                  null,
                  h(HeroSection),
                  h("div", { className: "gold-div" }),
                  h(MeteoSection),
                  h("div", { className: "gold-div" }),
                  h(CargosSection),
                  h("div", { className: "gold-div" }),
                  h(TimelineSection),
                  h("div", { className: "gold-div" }),
                  h(FilaesSection),
                  h("div", { className: "gold-div" }),
                  h(CartellSection),
                  h("div", { className: "gold-div" }),
                  h(GallerySection),
                  h("div", { className: "gold-div" }),
                  h(SeoContent),
                ),
                h(Footer),
              ),
            ),
          ),
        );
