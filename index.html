<!doctype html>
<html lang="ca" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeteoFestes2026 · Moros i Cristians d'Alcoi</title>
  <meta name="description" content="Consulta meteorològica per a les Festes de Moros i Cristians d'Alcoi 2026. Previsions actualitzades amb AVAMET, ECMWF i AROME."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ══════════════════════════════════════════════
       DESIGN TOKENS — DARK / LIGHT
    ══════════════════════════════════════════════ */
    :root,[data-theme="dark"] {
      --gold: #c9a84c; --gold-l: #e6c46a; --gold-d: #8a6f28;
      --red:  #cc0000; --red-d:  #8b0000;
      --bg:   #0b0806; --bg2: #16100a; --bg3: #231a0e;
      --card: rgba(35,26,14,.72);
      --surface: rgba(22,16,10,.68);
      --border: rgba(201,168,76,.18);
      --border-s: rgba(201,168,76,.32);
      --text: #fdf6e3; --text-m: rgba(253,246,227,.65); --text-s: rgba(253,246,227,.38);
      --nav-bg: rgba(11,8,6,.92);
      --hero-grad: linear-gradient(to bottom,rgba(11,8,6,.2) 0%,rgba(11,8,6,.55) 45%,rgba(11,8,6,1) 100%);
    }
    [data-theme="light"] {
      --bg:   #f9f4ea; --bg2: #fff8ec; --bg3: #f0e8d0;
      --card: rgba(255,252,245,.9);
      --surface: rgba(255,250,240,.92);
      --border: rgba(138,111,40,.22);
      --border-s: rgba(138,111,40,.45);
      --text: #1a1208; --text-m: rgba(26,18,8,.68); --text-s: rgba(26,18,8,.42);
      --nav-bg: rgba(249,244,234,.95);
      --hero-grad: linear-gradient(to bottom,rgba(249,244,234,.1) 0%,rgba(249,244,234,.55) 50%,rgba(249,244,234,1) 100%);
    }

    /* ══════════════════════════════════════════════
       RESET + BASE
    ══════════════════════════════════════════════ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
    .f-serif{font-family:"Playfair Display",serif}
    .f-crim {font-family:"Crimson Pro",serif}
    .f-mono {font-family:"DM Mono",monospace}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:4px}
    .no-scroll::-webkit-scrollbar{display:none}
    .no-scroll{-ms-overflow-style:none;scrollbar-width:none}

    /* ══════════════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════════════ */
    #nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:16px 0;transition:background .4s,padding .35s,box-shadow .4s,backdrop-filter .4s}
    #nav.scrolled{background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:8px 0;border-bottom:1px solid var(--border);box-shadow:0 4px 32px rgba(0,0,0,.28)}
    .nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;text-decoration:none}
    .nav-logo-img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border-s);transition:border-color .3s,box-shadow .3s;background:var(--bg2)}
    .nav-logo:hover .nav-logo-img{border-color:var(--gold);box-shadow:0 0 14px rgba(201,168,76,.22)}
    .nav-logo-txt{font-family:"Playfair Display",serif;font-size:1rem;font-weight:900;color:var(--text);letter-spacing:.02em;line-height:1}
    .nav-logo-txt span{color:var(--gold)}
    .nav-lnk{font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-m);text-decoration:none;cursor:pointer;white-space:nowrap;position:relative;transition:color .25s}
    .nav-lnk::after{content:"";position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--gold);transition:width .3s}
    .nav-lnk:hover{color:var(--gold-l)}
    .nav-lnk:hover::after{width:100%}
    .nav-icon-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--gold);cursor:pointer;padding:5px 8px;display:flex;align-items:center;gap:5px;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:background .2s,border-color .2s}
    .nav-icon-btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold)}
    .hamburger{display:none;background:none;border:none;color:var(--gold);cursor:pointer;padding:4px}
    @media(max-width:768px){.hamburger{display:flex;align-items:center}.nav-desk{display:none!important}.nav-logo-img{width:30px;height:30px}}
    .mob-overlay{position:fixed;inset:0;z-index:999;background:rgba(11,8,6,.97);backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px}
    [data-theme="light"] .mob-overlay{background:rgba(249,244,234,.98)}

    /* ══════════════════════════════════════════════
       HERO
    ══════════════════════════════════════════════ */
    #hero{position:relative;height:100svh;min-height:640px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .hero-bg{position:absolute;inset:0;background:var(--hero-grad),url("https://www.asjordi.org/upload/images/showroom/ano-2025/1903.jpg") center/cover no-repeat;transition:opacity .5s}
    .ptcl{position:absolute;border-radius:50%;background:var(--gold);animation:drift linear infinite}
    @keyframes drift{0%{transform:translateY(100vh) translateX(0);opacity:0}8%{opacity:.75}92%{opacity:.75}100%{transform:translateY(-10vh) translateX(var(--dx,30px));opacity:0}}
    .hero-glass{width:180px;height:180px;border-radius:50%;background:rgba(22,16,10,.35);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:2px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 28px;animation:float 5s ease-in-out infinite}
    [data-theme="light"] .hero-glass{background:rgba(249,244,234,.45);border-color:rgba(138,111,40,.45)}
    .hero-glass img{width:82%;height:82%;object-fit:cover;border-radius:50%}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes glow{0%,100%{text-shadow:0 0 20px rgba(201,168,76,.1)}50%{text-shadow:0 0 60px rgba(201,168,76,.2)}}
    .glow{animation:glow 4s ease-in-out infinite}
    .scroll-indicator{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);cursor:pointer}
    .scroll-indicator-track{width:24px;height:38px;border:1.5px solid rgba(201,168,76,.35);border-radius:12px;display:flex;justify-content:center;padding-top:7px}

    /* ══════════════════════════════════════════════
       COUNTDOWN (HERO)
    ══════════════════════════════════════════════ */
    .cd-wrap{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:24px 0 32px}
    .cd-block{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.28);border-radius:12px;padding:14px 18px 10px;min-width:70px;backdrop-filter:blur(14px);position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.25),inset 0 1px 0 rgba(201,168,76,.12)}
    [data-theme="light"] .cd-block{background:rgba(255,255,255,.6);border-color:rgba(138,111,40,.3);box-shadow:0 4px 24px rgba(0,0,0,.1),inset 0 1px 0 rgba(138,111,40,.2)}
    .cd-block::before{content:"";position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.5),transparent)}
    .cd-num{font-family:"Playfair Display",serif;font-size:clamp(1.7rem,5vw,2.6rem);font-weight:900;line-height:1;background:linear-gradient(160deg,var(--gold-l) 0%,var(--gold) 50%,var(--gold-d) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;min-width:2ch;text-align:center}
    .cd-lbl{font-size:.42rem;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:rgba(201,168,76,.55);margin-top:5px}
    .cd-sep{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,4vw,2rem);font-weight:900;color:rgba(201,168,76,.3);align-self:center;padding-bottom:12px;user-select:none}
    @media(max-width:400px){.cd-block{min-width:56px;padding:10px 10px 8px}.cd-wrap{gap:6px}}

    /* ══════════════════════════════════════════════
       SECTION COMMON
    ══════════════════════════════════════════════ */
    .sec-lbl{font-size:.52rem;font-weight:700;letter-spacing:.38em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
    .sec-ttl{font-family:"Playfair Display",serif;font-size:clamp(1.9rem,5vw,3.1rem);font-weight:900;line-height:1.08;color:var(--text)}
    .sec-ttl em{color:var(--gold);font-style:italic}
    .gold-div{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.25),transparent)}

    /* ══════════════════════════════════════════════
       LIVE STATION
    ══════════════════════════════════════════════ */
    .live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.18)}50%{box-shadow:0 0 0 7px rgba(34,197,94,.04)}}
    .stat-box{background:rgba(201,168,76,.05);border-radius:8px;padding:12px 16px;border:1px solid rgba(201,168,76,.12)}
    [data-theme="light"] .stat-box{background:rgba(138,111,40,.06);border-color:rgba(138,111,40,.2)}
    .stat-lbl{font-size:.46rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(201,168,76,.6)}
    .stat-val{font-family:"Playfair Display",serif;font-size:1.55rem;font-weight:700;color:var(--text);line-height:1}

    /* ══════════════════════════════════════════════
       HERO METEO CARDS (Dies Grans)
    ══════════════════════════════════════════════ */
    .hcard{position:relative;background:var(--card);border:1.5px solid var(--border-s);border-radius:18px;padding:24px 22px 16px;overflow:hidden;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:transform .35s cubic-bezier(.25,.1,.25,1),border-color .35s,box-shadow .35s;cursor:pointer}
    .hcard::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,.06),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(204,0,0,.03),transparent 50%);pointer-events:none}
    .hcard::after{content:"";position:absolute;top:-1px;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.5),transparent)}
    .hcard:hover{transform:translateY(-6px) scale(1.015);border-color:rgba(201,168,76,.55);box-shadow:0 20px 50px rgba(0,0,0,.45),0 0 40px rgba(201,168,76,.08)}
    .hcard.oor{border-style:dashed;border-color:var(--border);background:var(--surface)}
    .hcard.oor:hover{transform:translateY(-3px) scale(1.005);box-shadow:0 8px 22px rgba(0,0,0,.3)}
    [data-theme="light"] .hcard{background:rgba(255,252,245,.95);box-shadow:0 2px 16px rgba(0,0,0,.08)}
    [data-theme="light"] .hcard:hover{box-shadow:0 20px 50px rgba(0,0,0,.15),0 0 40px rgba(138,111,40,.1)}
    .hc-day{font-family:"Playfair Display",serif;font-size:3.2rem;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hc-temp{font-family:"Playfair Display",serif;font-size:2.4rem;font-weight:900;color:var(--text);line-height:1}
    .hc-evt{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--text);line-height:1.2}
    .hc-wday{font-size:.48rem;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);opacity:.75}
    .hc-mini{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.12);border-radius:10px;padding:9px 7px;text-align:center}
    [data-theme="light"] .hc-mini{background:rgba(138,111,40,.06);border-color:rgba(138,111,40,.18)}
    .hc-mini-lbl{font-size:.4rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,.5);margin-bottom:3px}
    .hc-mini-val{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:var(--text)}
    .hc-mini-val.nd{opacity:.28;font-size:.8rem;letter-spacing:.18em}
    .hc-anal{font-family:"Crimson Pro",serif;font-size:.8rem;line-height:1.58;color:var(--text-m);border-left:3px solid;padding-left:12px}
    .hc-anal.nd-w{font-size:.72rem;font-style:italic;color:var(--text-s);border-left-color:var(--border)!important}
    .soon-pill{display:inline-flex;align-items:center;gap:4px;font-size:.4rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,168,76,.45);background:rgba(201,168,76,.05);border:1px dashed rgba(201,168,76,.2);padding:3px 9px;border-radius:20px;white-space:nowrap}
    .mbadge{font-size:.4rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:2px 6px;border-radius:4px;display:inline-block}
    .mbadge.ecmwf{background:rgba(201,168,76,.15);color:var(--gold-l);border:1px solid rgba(201,168,76,.3)}
    .mbadge.arome{background:rgba(204,0,0,.15);color:#ff7070;border:1px solid rgba(204,0,0,.3)}

    /* CTA hint */
    .cta-hint{display:flex;align-items:center;justify-content:center;gap:5px;font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,.45);padding:9px 14px 0;border-top:1px solid rgba(201,168,76,.08);margin-top:12px;transition:color .25s;user-select:none}
    .cta-arr{display:inline-block;transition:transform .25s}
    .hcard:hover .cta-hint{color:var(--gold-l)}
    .hcard:hover .cta-arr{transform:translateX(4px)}

    /* ══════════════════════════════════════════════
       COUNTDOWN CARDS (Entraetes)
    ══════════════════════════════════════════════ */
    .ccard{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .28s cubic-bezier(.25,.1,.25,1),border-color .28s,box-shadow .28s;display:flex;flex-direction:column;cursor:pointer}
    .ccard::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent)}
    .ccard:hover{transform:translateY(-4px);border-color:var(--border-s);box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .ccard.oor{border-style:dashed;border-color:rgba(201,168,76,.1)}
    [data-theme="light"] .ccard{background:rgba(255,252,245,.9);box-shadow:0 1px 8px rgba(0,0,0,.06)}
    .cc-hdr{padding:15px 17px 13px}
    .cc-div{height:1px;margin:0 17px;background:linear-gradient(90deg,transparent 0%,rgba(201,168,76,.25) 30%,rgba(201,168,76,.25) 70%,transparent 100%)}
    .cc-agenda{padding:13px 17px 15px;display:flex;flex-direction:column;gap:13px}
    .cc-carrer-hdr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
    .cc-carrer-nm{font-family:"Playfair Display",serif;font-size:.86rem;font-weight:700;color:var(--text-m);letter-spacing:.02em;line-height:1}
    .cc-pin-icon{width:16px;height:16px;flex-shrink:0;color:rgba(201,168,76,.5)}
    .cc-df-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:5px}
    .cc-df-row{display:flex;align-items:center;gap:7px;background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.08);border-radius:8px;padding:6px 9px;transition:background .2s,border-color .2s}
    [data-theme="light"] .cc-df-row{background:rgba(138,111,40,.04);border-color:rgba(138,111,40,.1)}
    .cc-df-row:hover{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.15)}
    .cc-df-hora{font-family:"DM Mono",monospace;font-size:.6rem;color:rgba(201,168,76,.5);flex-shrink:0}
    .cc-df-fila{font-size:.7rem;font-weight:600;color:var(--text-m);line-height:1.2;flex:1}
    .cc-ee{display:inline-flex;align-items:center;background:linear-gradient(135deg,#c9a84c,#8a6f28);color:#0b0806;font-size:.36rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:3px;flex-shrink:0}
    .cc-day{font-family:"Playfair Display",serif;font-size:1.55rem;font-weight:900;color:var(--text);line-height:1}
    .cc-wday{font-size:.4rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,.45)}
    .cc-tmp{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--text)}
    .cc-tmp.nd{opacity:.25;font-size:.9rem}
    .cc-prob{font-size:.62rem;font-weight:600}
    .nd-hint{font-family:"Crimson Pro",serif;font-size:.66rem;font-style:italic;color:var(--text-s);padding:6px 9px;border-top:1px solid rgba(201,168,76,.07);margin-top:3px;line-height:1.5}

    /* ══════════════════════════════════════════════
       GUIDE CARDS
    ══════════════════════════════════════════════ */
    .guide-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;transition:transform .25s,border-color .25s}
    .guide-card:hover{transform:translateY(-4px);border-color:var(--border-s)}
    [data-theme="light"] .guide-card{background:rgba(255,252,245,.9);box-shadow:0 1px 8px rgba(0,0,0,.06)}

    /* ══════════════════════════════════════════════
       CARGOS SECTION
    ══════════════════════════════════════════════ */
    .cargo-section{padding:80px 24px;background:rgba(10,6,2,.5)}
    [data-theme="light"] .cargo-section{background:rgba(240,228,192,.35)}
    .bando-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    [data-theme="light"] .bando-card{background:rgba(255,252,245,.95);box-shadow:0 2px 12px rgba(0,0,0,.07)}
    .bando-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .cargo-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .2s}
    .cargo-item:last-child{border-bottom:none}
    .cargo-item:hover{background:rgba(201,168,76,.04)}
    .cargo-shield{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--border-s);overflow:hidden}
    .cargo-shield img{width:100%;height:100%;object-fit:cover}
    .cargo-shield-txt{font-family:"Playfair Display",serif;font-size:.55rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;text-align:center;line-height:1.2;padding:4px}
    .cargo-role{font-size:.48rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
    .cargo-name{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:var(--text);margin-top:2px}

    /* ══════════════════════════════════════════════
       TIMELINE
    ══════════════════════════════════════════════ */
    .tl-dot{width:48px;height:48px;border-radius:50%;background:var(--bg2);border:2px solid var(--gold-d);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;cursor:pointer}
    .tl-dot.act{background:var(--red);border-color:var(--gold);box-shadow:0 0 0 6px rgba(201,168,76,.1);transform:scale(1.1)}
    .tl-line{width:2px;background:rgba(201,168,76,.2);flex-shrink:0}
    .tl-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;backdrop-filter:blur(6px)}
    [data-theme="light"] .tl-card{background:rgba(255,252,245,.95);box-shadow:0 2px 12px rgba(0,0,0,.07)}

    /* ══════════════════════════════════════════════
       FILAES
    ══════════════════════════════════════════════ */
    .fcard{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative;transition:transform .28s,border-color .28s,box-shadow .28s;cursor:pointer}
    .fcard:hover{transform:translateY(-6px) scale(1.02);border-color:var(--gold);box-shadow:0 14px 36px rgba(0,0,0,.35),0 0 0 1px rgba(201,168,76,.28)}
    [data-theme="light"] .fcard{background:rgba(255,252,245,.95)}
    .fbadge{position:absolute;top:8px;right:8px;z-index:2;font-size:.42rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border-radius:3px}
    .fbadge-c{background:var(--red);color:#fff}
    .fbadge-m{background:#14532d;color:#86efac;border:1px solid #166534}

/* ══════════════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════════════ */
const FESTA_TARGET=new Date("2026-04-24T00:00:00");
function Countdown(){
  const getR=useCallback(()=>{
    const d=FESTA_TARGET-Date.now();
    if(d<=0)return null;
    return{dies:Math.floor(d/864e5),hores:Math.floor((d/36e5)%24),minuts:Math.floor((d/6e4)%60),segons:Math.floor((d/1e3)%60)};
  },[]);
  const[rem,setRem]=useState(getR);
  useEffect(()=>{const id=setInterval(()=>setRem(getR()),1000);return()=>clearInterval(id);},[getR]);
  if(!rem)return h("div",{style:{fontFamily:"Playfair Display,serif",fontStyle:"italic",color:"var(--gold)",fontSize:"clamp(1.1rem,3vw,1.5rem)",margin:"24px 0 32px"}},"Les Festes han Começat!");
  const units=[{v:rem.dies,l:"Dies"},{v:rem.hores,l:"Hores"},{v:rem.minuts,l:"Minuts"},{v:rem.segons,l:"Segons"}];
  return h("div",{className:"cd-wrap","aria-label":"Compte arrere"},
    units.map((u,i)=>h(React.Fragment,{key:u.l},
      h("div",{className:"cd-block"},
        h(AnimatePresence,{mode:"popLayout"},
          h(motion.div,{key:u.v,className:"cd-num",initial:{opacity:0,y:-10},animate:{opacity:1,y:0},exit:{opacity:0,y:10},transition:{duration:.2}},String(u.v).padStart(2,"0"))
        ),
        h("div",{className:"cd-lbl"},u.l)
      ),
      i<3&&h("div",{className:"cd-sep","aria-hidden":true},":")
    ))
  );
}

/* ══════════════════════════════════════════════

function AudioPlayer(){
  const{isPlaying,setPlaying,cur,nextTrack,volume,setVolume,muted,setMuted}=useAudio();
  const t=useT();
  const[toast,setToast]=useState(false);
  const prevCur=useRef(cur);
  useEffect(()=>{
    if(isPlaying){
      setToast(false);
      const a=setTimeout(()=>setToast(true),50);
      const b=setTimeout(()=>setToast(false),4500);
      prevCur.current=cur;
      return()=>{clearTimeout(a);clearTimeout(b)};
    }
  },[cur,isPlaying]);

  return h(React.Fragment,null,
    h("div",{className:"player"},
      h("button",{className:"play-btn",onClick:()=>setPlaying(!isPlaying),"aria-label":isPlaying?"Pausa":"Play"},
        h(Ic,{n:isPlaying?"pause":"play",sz:18,col:"#0b0806"})

      h("div",{style:{minWidth:90,maxWidth:130}},
        h("div",{style:{fontSize:".44rem",color:"var(--gold)",fontWeight:700,letterSpacing:".18em",textTransform:"uppercase"}},t.nowPlaying),
        h("div",{style:{fontSize:".7rem",fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},PLAYLIST[cur].name)
      ),

      h("div",{className:"vol-bar"},h("div",{className:"vol-fill",style:{width:`${(muted?0:volume)*100}%`}})),
      h("button",{className:"player-icon-btn",onClick:()=>setVolume(Math.min(1,+(volume+.1).toFixed(1)))},h(Ic,{n:"plus",sz:14})),
      h("div",{style:{width:1,height:20,background:"var(--border)",flexShrink:0}}),
      h("button",{className:"player-icon-btn",onClick:nextTrack,"aria-label":"Siguiente"},h(Ic,{n:"next",sz:16}))
    ),
    h(AnimatePresence,null,
      toast&&h(motion.div,{
        initial:{opacity:0,y:-16,x:16},animate:{opacity:1,y:0,x:0},exit:{opacity:0,y:-16},
        style:{position:"fixed",top:20,right:20,zIndex:1002,background:"var(--surface)",border:"1px solid var(--gold)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,backdropFilter:"blur(16px)"}
      },

        h("div",null,

          h("div",{style:{fontSize:".82rem",fontWeight:600,color:"var(--text)"}},PLAYLIST[cur].name)
        )
      )
    )
  );
}

/* ══════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════ */
function App(){
  /* Theme */
  const[theme,setTheme]=useState("dark");
  const toggleTheme=useCallback(()=>{
    setTheme(t=>{
      const next=t==="dark"?"light":"dark";
      document.documentElement.setAttribute("data-theme",next);
      return next;
    });
  },[]);

  /* Language */
  const[lang,setLang]=useState("ca");

  /* Scroll */
  const[scrolled,setScrolled]=useState(false);
  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>60);
    window.addEventListener("scroll",fn,{passive:true});
    return()=>window.removeEventListener("scroll",fn);
  },[]);

  /* Audio */
  const[isPlaying,setPlaying]=useState(false);
  const[cur,setCur]=useState(0);
  const[volume,setVolume]=useState(1);
  const[muted,setMuted]=useState(false);
  const audioRef=useRef(null);

  useEffect(()=>{
    audioRef.current=new Audio(PLAYLIST[0].file);
    audioRef.current.loop=false;
    audioRef.current.addEventListener("ended",()=>setCur(c=>(c+1)%PLAYLIST.length));
    return()=>{audioRef.current?.pause();};
  },[]);

  useEffect(()=>{
    if(!audioRef.current)return;
    audioRef.current.src=PLAYLIST[cur].file;
    if(isPlaying)audioRef.current.play().catch(()=>setPlaying(false));
  },[cur]);

  useEffect(()=>{
    if(!audioRef.current)return;
    if(isPlaying)audioRef.current.play().catch(()=>setPlaying(false));
    else audioRef.current.pause();
  },[isPlaying]);

  useEffect(()=>{
    if(audioRef.current)audioRef.current.volume=muted?0:volume;
  },[volume,muted]);

  const nextTrack=()=>setCur(c=>(c+1)%PLAYLIST.length);

  const D=h("div",{className:"gold-div"});

  return h(ThemeCtx.Provider,{value:{theme,toggleTheme}},
    h(LangCtx.Provider,{value:{lang,setLang}},
      h(AudioCtx.Provider,{value:{isPlaying,setPlaying,cur,nextTrack,volume,setVolume,muted,setMuted}},
        h(React.Fragment,null,
          h(AudioPlayer),
          h(Navbar,{scrolled}),
          h("main",{style:{maxWidth:1600,margin:"0 auto",overflowX:"hidden"}},
            h(HeroSection),D,
            h(MeteoSection),D,
            h(CargosSection),D,
            h(TimelineSection),D,
            h(FilaesSection),D,
            h(CartellSection),D,
            h(GallerySection)
          ),
          h(Footer)
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
