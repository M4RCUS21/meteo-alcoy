      /* ═══════════════════════════════════════════════
         DESIGN TOKENS
         ═══════════════════════════════════════════════ */
      :root {
        --red: #cc0000;
        --red-dark: #8b0000;
        --red-light: #ff3333;
        --gold: #c9a84c;
        --gold-light: #e6c46a;
        --gold-dark: #8a6f28;
        --cream: #fdf6e3;
        --parch: #f0e4c0;
        --dark: #0b0806;
        --dark2: #16100a;
        --dark3: #231a0e;
        --dark-card: rgba(35, 26, 14, 0.72);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: var(--dark);
        color: var(--cream);
        font-family: "DM Sans", sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .font-serif  { font-family: "Playfair Display", serif; }
      .font-crim   { font-family: "Crimson Pro", serif; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--dark); }
      ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 4px; }

      /* ═══════════════════════════════════════════════
         NAVBAR
         ═══════════════════════════════════════════════ */
      #navbar {
        position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        transition: background .4s, padding .4s, backdrop-filter .4s, box-shadow .4s;
        padding: 16px 0;
      }
      #navbar.scrolled {
        background: rgba(11, 8, 6, .92);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        padding: 8px 0;
        border-bottom: 1px solid rgba(201,168,76,.12);
        box-shadow: 0 4px 30px rgba(0,0,0,.35);
      }
      .nav-logo {
        display: flex; align-items: center; gap: 10px;
        cursor: pointer; text-decoration: none; user-select: none;
      }
      .nav-logo-img {
        width: 38px; height: 38px; border-radius: 50%; object-fit: cover;
        border: 1.5px solid rgba(201,168,76,.35);
        transition: border-color .3s, box-shadow .3s;
        background: var(--dark2);
      }
      .nav-logo:hover .nav-logo-img {
        border-color: var(--gold);
        box-shadow: 0 0 12px rgba(201,168,76,.2);
      }
      .nav-logo-text {
        font-family: "Playfair Display", serif;
        font-size: 1.05rem; font-weight: 900; color: #fff;
        letter-spacing: .02em; line-height: 1;
      }
      .nav-logo-text span { color: var(--gold); }

      .nav-link {
        font-size: .62rem; font-weight: 600; letter-spacing: .2em;
        text-transform: uppercase; color: rgba(253,246,227,.55);
        text-decoration: none; transition: color .25s; cursor: pointer;
        white-space: nowrap; position: relative;
      }
      .nav-link::after {
        content: ''; position: absolute; bottom: -3px; left: 0;
        width: 0; height: 1px; background: var(--gold);
        transition: width .3s;
      }
      .nav-link:hover { color: var(--gold-light); }
      .nav-link:hover::after { width: 100%; }

      .nav-hamburger {
        display: none; background: none; border: none;
        color: var(--gold); cursor: pointer; padding: 4px;
      }
      @media (max-width: 768px) {
        .nav-hamburger { display: flex; align-items: center; }
        .nav-desk { display: none !important; }
        .nav-logo-img { width: 32px; height: 32px; }
        .nav-logo-text { font-size: .9rem; }
      }
      .mobile-overlay {
        position: fixed; inset: 0; z-index: 999;
        background: rgba(11,8,6,.97);
        backdrop-filter: blur(24px);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 28px;
      }
      .mobile-overlay .nav-link { font-size: 1rem; letter-spacing: .28em; color: rgba(253,246,227,.75); }

      /* ═══════════════════════════════════════════════
         HERO
         ═══════════════════════════════════════════════ */
      #hero {
        position: relative; height: 100svh; min-height: 660px;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
      }
      .hero-bg {
        position: absolute; inset: 0;
        background:
          linear-gradient(to bottom, rgba(11,8,6,.2) 0%, rgba(11,8,6,.55) 45%, rgba(11,8,6,1) 100%),
          radial-gradient(ellipse at 50% 25%, rgba(201,168,76,.08) 0%, transparent 55%),
          radial-gradient(ellipse at 70% 65%, rgba(204,0,0,.04) 0%, transparent 45%),
          url("https://www.asjordi.org/upload/images/showroom/ano-2025/1903.jpg") center/cover no-repeat;
      }
      .hero-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
      .particle {
        position: absolute; border-radius: 50%; background: var(--gold);
        animation: drift linear infinite;
      }
      @keyframes drift {
        0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
        8%   { opacity: .8; }
        92%  { opacity: .8; }
        100% { transform: translateY(-10vh) translateX(var(--dx, 30px)); opacity: 0; }
      }
      .hero-glass {
        width: 190px; height: 190px; border-radius: 50%;
        background: rgba(22,16,10,.35);
        backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
        border: 2px solid rgba(201,168,76,.3);
        box-shadow: 0 0 80px rgba(201,168,76,.08), 0 0 160px rgba(201,168,76,.04),
                    inset 0 0 50px rgba(201,168,76,.04);
        display: flex; align-items: center; justify-content: center;
        overflow: hidden; margin: 0 auto 28px;
      }
      .hero-glass img {
        width: 85%; height: 85%; object-fit: cover; border-radius: 50%;
      }
      @keyframes heroFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .hero-float { animation: heroFloat 5s ease-in-out infinite; }
      @keyframes glowPulse {
        0%, 100% { text-shadow: 0 0 20px rgba(201,168,76,.12); }
        50%      { text-shadow: 0 0 50px rgba(201,168,76,.22); }
      }
      .glow { animation: glowPulse 4s ease-in-out infinite; }

      /* ═══════════════════════════════════════════════
         DIVIDER
         ═══════════════════════════════════════════════ */
      .gold-div {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,168,76,.25), transparent);
      }

      /* ═══════════════════════════════════════════════
         SECTION TITLES
         ═══════════════════════════════════════════════ */
      .sec-label {
        font-size: .55rem; font-weight: 600; letter-spacing: .38em;
        text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
      }
      .sec-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 900; line-height: 1.08; color: var(--cream);
      }
      .sec-title em { color: var(--gold); font-style: italic; }

      /* ═══════════════════════════════════════════════
         IA PANEL
         ═══════════════════════════════════════════════ */
      .ia-panel {
        background: linear-gradient(135deg, rgba(35,26,14,.85), rgba(22,16,10,.92));
        border: 1px solid rgba(201,168,76,.18);
        border-left: 3px solid var(--gold);
        border-radius: 14px; padding: 26px; margin-bottom: 36px;
        position: relative; overflow: hidden;
      }
      .ia-panel::before {
        content: ''; position: absolute; top: -40%; right: -40%;
        width: 80%; height: 80%;
        background: radial-gradient(circle, rgba(201,168,76,.035), transparent 60%);
        pointer-events: none;
      }

      /* ═══════════════════════════════════════════════
         LIVE DOT
         ═══════════════════════════════════════════════ */
      .live-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #22c55e; animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,.18); }
        50%     { box-shadow: 0 0 0 7px rgba(34,197,94,.04); }
      }

        background: rgba(201,168,76,.05); border-radius: 8px;
        padding: 12px 16px; border: 1px solid rgba(201,168,76,.12);
      }
      .fs-label {
        font-size: .48rem; font-weight: 600; letter-spacing: .22em;
        text-transform: uppercase; color: rgba(201,168,76,.55);
      }
      .fs-val {
        font-family: "Playfair Display", serif;
        font-size: 1.6rem; font-weight: 700; color: var(--cream); line-height: 1;
      }

         TIMELINE
         ═══════════════════════════════════════════════ */
      .tl-dot {
        width: 50px; height: 50px; border-radius: 50%;
        background: var(--dark2); border: 2px solid var(--gold-dark);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.2rem; flex-shrink: 0;
        transition: all .3s; cursor: pointer;
      }
      .tl-dot.active {
        background: var(--red); border-color: var(--gold);
        box-shadow: 0 0 0 6px rgba(201,168,76,.12);
        transform: scale(1.12);
      }
      .tl-line {
        width: 2px; background: rgba(201,168,76,.2); flex-shrink: 0;
      }

      /* ═══════════════════════════════════════════════
         FILAES
         ═══════════════════════════════════════════════ */
      .fila-card {
        background: var(--dark-card);
        border: 1px solid rgba(201,168,76,.12); border-radius: 10px;
        overflow: hidden; position: relative;
        transition: transform .28s, border-color .28s, box-shadow .28s;
        cursor: pointer;
      }
      .fila-card:hover {
        transform: translateY(-6px) scale(1.02);
        border-color: var(--gold);
        box-shadow: 0 14px 36px rgba(0,0,0,.4), 0 0 0 1px rgba(201,168,76,.28);
      }
      .fila-badge {
        position: absolute; top: 8px; right: 8px; z-index: 2;
        font-size: .44rem; font-weight: 700; letter-spacing: .12em;
        text-transform: uppercase; padding: 2px 8px; border-radius: 3px;

      .badge-c { background: var(--red); color: #fff; }
      .badge-m { background: var(--dark2); color: var(--gold); border: 1px solid var(--gold-dark); }
      .cargo-pill {
        position: absolute; top: 8px; left: 8px; z-index: 2;
        font-size: .4rem; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; padding: 3px 8px; border-radius: 3px;
        background: linear-gradient(135deg, var(--gold), var(--gold-dark));
        color: var(--dark); box-shadow: 0 2px 8px rgba(201,168,76,.25);
      }
      .tab-btn {
        padding: 8px 24px; border-radius: 30px;
        font-size: .65rem; font-weight: 600; letter-spacing: .16em;
        text-transform: uppercase; cursor: pointer;
        transition: all .25s;
        border: 1px solid rgba(201,168,76,.25);
        background: transparent; color: rgba(253,246,227,.45);
      }
      .tab-btn.on { background: var(--red); color: #fff; border-color: var(--red); }

      /* ═══════════════════════════════════════════════
         CARTEL FRAME
         ═══════════════════════════════════════════════ */
      .cartel-frame {
        position: relative;
        background: linear-gradient(135deg, rgba(201,168,76,.1), rgba(138,111,40,.06));
        border: 2px solid rgba(201,168,76,.28); border-radius: 16px;
        padding: 14px;
        box-shadow: 0 24px 72px rgba(0,0,0,.45),

        max-width: 500px; margin: 0 auto; overflow: hidden;
      }
      .cartel-frame::before {
        content: ''; position: absolute; inset: 7px;
        border: 1px solid rgba(201,168,76,.12); border-radius: 12px;
        pointer-events: none;
      }
      .cartel-frame img { width: 100%; border-radius: 10px; display: block; }

      /* ═══════════════════════════════════════════════
         MASONRY GALLERY
         ═══════════════════════════════════════════════ */
      .masonry { columns: 2; gap: 8px; }
      .masonry-item {
        break-inside: avoid; margin-bottom: 8px;
        overflow: hidden; border-radius: 8px;
      }
      .masonry-item img {
        width: 100%; display: block;
        transition: transform .45s;
      }
      .masonry-item:hover img { transform: scale(1.04); }
      @media (min-width: 640px) { .masonry { columns: 3; } }

      /* ═══════════════════════════════════════════════
         FOOTER
         ═══════════════════════════════════════════════ */
      footer {
        background: linear-gradient(to bottom, var(--dark), #040302);
        border-top: 1px solid rgba(201,168,76,.12);
        padding: 64px 24px 44px;
      }
    </style>

                  "Viu la màgia de la trilogia. Quatre dies on la història, la música, la fe i la pólvora s'uneixen en la festa més espectacular del Mediterrani. Un cartell que convida a sentir l'emoció d'Alcoi."
                ),
              )
            ),
          )
        );
      }

      // ────────────────── GALERIA (PHOTOS ONLY) ──────────────────
      function GallerySection() {
        return h("section", { id: "galeria", style: { padding: "88px 24px", maxWidth: 1100, margin: "0 auto" } },
          h(FadeIn, null,
            h("div", { style: { textAlign: "center", marginBottom: 40 } },
              h("div", { className: "sec-label" }, "Imatges · Arxiu Fotogràfic"),
              h("h2", { className: "sec-title" }, h("em", null, "Galeria"), " Multimèdia"),
            )
          ),
          h("div", { className: "masonry" },
            GALLERY.map((url, i) =>
              h(motion.div, { key: i, className: "masonry-item",
                initial: { opacity: 0, y: 20 }, whileInView: { opacity: 1, y: 0 },
                viewport: { once: true }, transition: { delay: i * .06, duration: .5 },
              },
                h("img", { src: url, alt: "Festes d'Alcoi", loading: "lazy" })
              )
            )
          ),
        );
      }

      // ────────────────── FOOTER ──────────────────
      function Footer() {
        return h("footer", null,
          h("div", { style: { maxWidth: 1100, margin: "0 auto" } },
            h("div", { style: { display: "flex", flexWrap: "wrap", gap: 48, justifyContent: "space-between", marginBottom: 52 } },
              // Col 1 — Brand + Legal
              h("div", { style: { flex: "1 1 280px", minWidth: 220 } },
                h("div", { style: { display: "flex", alignItems: "center", gap: 10, marginBottom: 18 } },
                  h("img", { src: "./logo.png", alt: "Logo", style: { width: 32, height: 32, borderRadius: "50%", objectFit: "cover", border: "1px solid rgba(201,168,76,.25)", background: "var(--dark2)" } }),
                  h("div", { style: { fontFamily: "Playfair Display, serif", fontSize: "1.1rem", fontWeight: 900, color: "#fdf6e3" } },
                    "Meteo", h("span", { style: { color: "#c9a84c" } }, "Festes"), "2026"
                  ),
                ),
                h("div", { style: { background: "rgba(35,26,14,.5)", border: "1px solid rgba(201,168,76,.1)", borderRadius: 10, padding: 16, marginBottom: 14 } },
                  h("div", { style: { fontSize: ".48rem", fontWeight: 700, letterSpacing: ".22em", textTransform: "uppercase", color: "rgba(201,168,76,.45)", marginBottom: 8 } }, "Avís Legal"),
                  h("p", { style: { fontFamily: "Crimson Pro, serif", fontSize: ".82rem", color: "rgba(253,246,227,.45)", lineHeight: 1.65 } },
                    "Lloc web sense ànim de lucre creat exclusivament per a la consulta meteorològica festera. Tots els drets de les imatges pertanyen a les seues respectives fonts i autors (Associació de Sant Jordi, etc.)."
                  ),
                ),
              ),
              // Col 2 — Useful links
              h("div", { style: { flex: "0 1 210px" } },
                h("div", { style: { fontSize: ".5rem", fontWeight: 700, letterSpacing: ".26em", textTransform: "uppercase", color: "rgba(201,168,76,.45)", marginBottom: 18 } }, "Enllaços Útils"),
                [
                  ["https://www.asjordi.org", "Associació de Sant Jordi"],
                  ["https://www.alcoyturismo.com", "Turisme Alcoi"],
                  ["https://www.avamet.org", "AVAMET Meteorologia"],
                  ["https://open-meteo.com", "Open-Meteo API"],
                  ["https://www.meteociel.fr", "Meteociel GEFS"],
                ].map(([href, label]) =>
                  h("a", { key: href, href, target: "_blank", rel: "noopener noreferrer",
                    style: { display: "block", fontSize: ".76rem", color: "#c9a84c", marginBottom: 11, textDecoration: "none", opacity: .65, transition: "opacity .2s" },
                    onMouseOver: e => { e.currentTarget.style.opacity = 1; },
                    onMouseOut:  e => { e.currentTarget.style.opacity = .65; },
                  }, "→ " + label)
                ),
              ),
              // Col 3 — Data sources
              h("div", { style: { flex: "0 1 200px" } },
                h("div", { style: { fontSize: ".5rem", fontWeight: 700, letterSpacing: ".26em", textTransform: "uppercase", color: "rgba(201,168,76,.45)", marginBottom: 18 } }, "Fonts de Dades"),
                ["AVAMET · c27m009e08", "Open-Meteo API", "Meteociel GEFS", "IA Generativa"].map(l =>
                  h("div", { key: l, style: { fontSize: ".74rem", color: "rgba(253,246,227,.38)", marginBottom: 10, display: "flex", alignItems: "center", gap: 7 } },
                    h("div", { style: { width: 4, height: 4, borderRadius: "50%", background: "var(--gold-dark)", flexShrink: 0 } }),
                    l
                  )
                ),
              ),
            ),
            // Divider
            h("div", { style: { height: 1, background: "linear-gradient(90deg, transparent, rgba(201,168,76,.12), transparent)", marginBottom: 28 } }),
            // Bottom
            h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 14, marginBottom: 28 } },
              h("p", { style: { fontSize: ".55rem", color: "rgba(253,246,227,.18)", letterSpacing: ".1em" } },
                "© 2026 MeteoFestes2026 · Dades: AVAMET · Open-Meteo · Meteociel"
              ),
            ),
            // Final message
            h("div", { style: { textAlign: "center", paddingTop: 6 } },
              h("p", { style: { fontFamily: "Crimson Pro, serif", fontStyle: "italic", color: "#c9a84c", fontSize: "1.18rem", letterSpacing: ".03em" } },
                "✦ Vítol al Patró Sant Jordi! ✦"
              ),
            ),
          ),
        );
      }

      /* ═══════════════════════════════════════════════════════
         APP ROOT
         ═══════════════════════════════════════════════════════ */
      function App() {
        const [scrolled, setScrolled] = useState(false);
        useEffect(() => {
          const fn = () => setScrolled(window.scrollY > 60);
          window.addEventListener("scroll", fn, { passive: true });
          return () => window.removeEventListener("scroll", fn);
        }, []);

        const div = h("div", { className: "gold-div" });

        return h(React.Fragment, null,
          h(Navbar, { scrolled }),
          h(HeroSection),
          div,
          h(MeteoSection),
          div,
          h(TimelineSection),
          div,
          h(FilaesSection),
          div,
          h(CartelSection),
          div,
          h(GallerySection),
          h(Footer),
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
