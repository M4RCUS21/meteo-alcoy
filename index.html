              meteo.mapa_url && meteo.mapa_url !== "N/D" && h(FadeIn, { delay:.4 },
                h("div", { className:"mt-12 p-6 bg-black/40 border border-[var(--gold)]/20 rounded-2xl" },
                  h("div", { className:"sec-label mb-4" }, t.meteoGram),
                  h("img", { src:meteo.mapa_url, className:"w-full rounded-lg border border-[var(--gold)]/10" })
                )
              )
            ) : h("div", { className:"text-center py-20 text-gray-500 italic" }, t.loading)
          ),

          /* ── MODAL HORAS ── */
          h(AnimatePresence, null,
            sel && h(motion.div, { className:"fixed inset-0 z-[2000] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md", initial:{opacity:0}, animate:{opacity:1}, exit:{opacity:0}, onClick:()=>setSel(null) },
              h(motion.div, { className:"modal-card w-full max-w-xl p-8 rounded-3xl relative", initial:{y:50, scale:0.95}, animate:{y:0, scale:1}, exit:{y:20, scale:0.95}, onClick:e=>e.stopPropagation() },
                h("button", { className:"absolute top-5 right-5 text-[var(--gold)] hover:text-white text-xl", onClick:()=>setSel(null) }, "✕"),
                h("div", { className:"mb-6" },
                  h("h3", { className:"font-serif text-2xl font-bold text-white mb-2" }, sel.dia),
                  sel.modelo_fuente !== "N/D" && !isOOR(sel) && h("span", { className:"model-badge " + sel.modelo_fuente.toLowerCase() }, sel.modelo_fuente)
                ),
                (!sel.horas || sel.horas.length === 0 || isOOR(sel)) ?
                  h("p", { className:"italic text-gray-400 text-center py-8" }, t.modalNoHours, h("br"), h("span", { className:"text-xs opacity-70" }, t.modalNoHint)) :
                  h("div", { className:"flex items-center gap-4" },
                    h(ArrowBtn, { dir:-1 }),
                    h("div", { ref:hoursRef, className:"flex gap-3 overflow-x-auto hide-scrollbar pb-2 pt-1 flex-1 snap-x" },
                      sel.horas.map((hd, i) => h("div", { key:i, className:"hourly-card snap-center shrink-0" },
                        h("span", { className:"font-mono text-xs text-[var(--gold)] mb-2" }, hd.hora),
                        h("span", { className:"text-3xl mb-2" }, hd.icono),
                        h("span", { className:"font-serif font-bold text-xl text-white" }, hd.temp !== "N/D" ? `${hd.temp}°` : "-"),
                        h("div", { className:"flex flex-col items-center mt-2" },
                          hd.prob > 0 && h("span", { className:"text-[0.65rem] font-bold text-blue-400" }, `${hd.prob}%`),
                          hd.litros > 0 && h("span", { className:"text-[0.6rem] text-blue-200" }, `${hd.litros}mm`)
                        )
                      ))
                    ),
                    h(ArrowBtn, { dir:1 })
                  )
              )
            )
          )
        );
      }

      /* ═══ TIMELINE & FILAES & CARTEL & GALLERY & FOOTER ═══ */
      function TimelineSection({ t }) {
        const [act, setAct] = useState(0);
        const it = TIMELINE[act];
        return h("section", { id:"trilogia", className:"py-24 px-6 max-w-4xl mx-auto" },
          h(FadeIn, null, h("div", { className:"text-center mb-16" }, h("div", { className:"sec-label" }, t.triLabel), h("h2", { className:"sec-title" }, t.triTitle[0], h("em", null, t.triTitle[1]), t.triTitle[2]))),
          h("div", { className:"flex flex-col md:flex-row gap-8" },
            h("div", { className:"flex md:flex-col justify-center items-center gap-4 md:gap-0" },
              TIMELINE.map((t2,i) => h(React.Fragment, { key:t2.id },
                h(motion.div, { className:"tl-dot" + (act===i?" active":""), onClick:()=>setAct(i), whileTap:{ scale:.9 } }, t2.emoji),
                i < TIMELINE.length-1 && h("div", { className:"hidden md:block w-[2px] h-12 bg-[var(--gold)]/20" })
              ))
            ),
            h("div", { className:"flex-1" },
              h(AnimatePresence, { mode:"wait" },
                h(motion.div, { key:act, initial:{opacity:0, x:20}, animate:{opacity:1, x:0}, exit:{opacity:0, x:-20}, className:"bg-black/60 border border-[var(--gold)]/20 border-l-4 rounded-2xl p-8", style:{borderLeftColor:it.color} },
                  h("div", { className:"flex items-baseline gap-3 mb-2" }, h("span", { className:"font-serif text-5xl font-black", style:{color:it.color} }, it.dia), h("span", { className:"text-xs font-bold tracking-widest text-gray-400 uppercase" }, "Abril")),
                  h("h3", { className:"font-serif text-2xl font-bold text-white mb-1" }, it.titol),
                  h("p", { className:"italic text-[var(--gold)] mb-6" }, it.subtitol),
                  h("p", { className:"text-gray-300 leading-relaxed mb-6" }, it.desc),
                  h("div", { className:"flex flex-col gap-3" }, it.detalls.map((d,j) => h("div", { key:j, className:"flex items-center gap-3 text-sm text-gray-400" }, h("div", { className:"w-1.5 h-1.5 rounded-full", style:{background:it.color} }), d)))
                )
              )
            )
          )
        );
      }

      function FilaesSection({ t }) {
        const [fil, setFil] = useState("tot");
        const list = fil==="tot" ? FILAES : FILAES.filter(f=>f.tipus===fil);
        return h("section", { id:"filaes", className:"py-24 px-6 bg-black/40" },
          h("div", { className:"max-w-6xl mx-auto" },
            h(FadeIn, null, h("div", { className:"text-center mb-12" }, h("div", { className:"sec-label" }, FILAES.length + " " + t.filaLabel), h("h2", { className:"sec-title" }, t.filaTitle[0], h("em", null, t.filaTitle[1]), t.filaTitle[2]))),
            h("div", { className:"flex justify-center gap-4 mb-12 flex-wrap" },
              [["tot", t.filAll, null], ["cristia", t.filC, "#cc0000"], ["moro", t.filM, "var(--green-moro)"]].map(([v,l,c]) =>
                h("button", { key:v, className:"tab-btn" + (fil===v?" on":""), onClick:()=>setFil(v), style:fil===v&&c?{background:c, borderColor:c}:{} }, l)
              )
            ),
            h(motion.div, { layout:true, className:"grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-7 gap-4" },
              h(AnimatePresence, null, list.map((f,i) => h(motion.div, { key:f.nom, layout:true, initial:{opacity:0, scale:.9}, animate:{opacity:1, scale:1}, exit:{opacity:0, scale:.9}, transition:{duration:.3} },
                h("div", { className:"fila-card rounded-xl" },
                  h("div", { className:"fila-badge " + (f.tipus==="cristia"?"badge-c":"badge-m") }, f.tipus==="cristia"?"C":"M"),
                  h("img", { src:f.img, className:"w-full aspect-[3/4] object-cover" }),
                  h("div", { className:"p-3 text-center text-[0.65rem] font-bold tracking-wider uppercase bg-black/90 text-gray-300" }, f.nom)
                )
              )))
            )
          )
        );
      }

      function CartelSection({ t }) {
        return h("section", { id:"cartell", className:"py-24 px-6 max-w-3xl mx-auto text-center" },
          h(FadeIn, null, h("div", { className:"sec-label" }, t.cartelLabel), h("h2", { className:"sec-title mb-12" }, t.cartelTitle[0], h("em", null, t.cartelTitle[1]))),
          h(FadeIn, { delay:.15 }, h("div", { className:"cartel-frame mx-auto" }, h("img", { src:"https://agendaalcoy.com/wp-content/uploads/2026/04/cartel-de-fiestas-de-moros-y-cristianos-alcoy-2026.jpg", className:"w-full rounded-xl" }))),
          h(FadeIn, { delay:.25 }, h("p", { className:"italic text-gray-400 mt-8 max-w-lg mx-auto" }, t.cartelText))
        );
      }

      function GallerySection({ t }) {
        return h("section", { id:"galeria", className:"py-24 px-6 max-w-6xl mx-auto" },
          h(FadeIn, null, h("div", { className:"text-center mb-12" }, h("div", { className:"sec-label" }, t.galLabel), h("h2", { className:"sec-title" }, t.galTitle[0], h("em", null, t.galTitle[1]), t.galTitle[2]))),
          h("div", { className:"masonry" }, GALLERY.map((url,i) => h(motion.div, { key:i, className:"masonry-item", initial:{opacity:0,y:20}, whileInView:{opacity:1,y:0}, viewport:{once:true}, transition:{delay:i*.05} }, h("img", { src:url, className:"w-full rounded-xl" }))))
        );
      }

      function Footer({ t }) {
        return h("footer", null,
          h("div", { className:"max-w-6xl mx-auto" },
            h("div", { className:"grid grid-cols-1 md:grid-cols-3 gap-12 mb-12" },
              h("div", null,
                h("div", { className:"flex items-center gap-3 mb-6" }, h("img", { src:"./logo.png", className:"w-10 h-10 rounded-full border border-[var(--gold)]/30" }), h("div", { className:"font-serif font-bold text-xl" }, "Meteo", h("span", {className:"text-[var(--gold)]"}, "Festes"), "2026")),
                h("div", { className:"bg-white/5 border border-[var(--gold)]/20 p-5 rounded-xl" }, h("div", { className:"text-xs font-bold text-[var(--gold)] tracking-widest uppercase mb-2" }, t.fLegal), h("p", { className:"text-sm text-gray-400 italic" }, t.fLegalText))
              ),
              h("div", null,
                h("div", { className:"text-xs font-bold text-[var(--gold)] tracking-widest uppercase mb-6" }, t.fLinks),
                [["https://www.asjordi.org","Associació de Sant Jordi"],["https://www.alcoyturismo.com","Turisme Alcoi"],["https://www.avamet.org","AVAMET Meteorologia"],["https://open-meteo.com","Open-Meteo API"]].map(([href,l]) => h("a", { key:href, href, target:"_blank", className:"block text-sm text-[var(--gold)] opacity-70 hover:opacity-100 mb-3 transition-opacity" }, "→ " + l))
              ),
              h("div", null,
                h("div", { className:"text-xs font-bold text-[var(--gold)] tracking-widest uppercase mb-6" }, t.fData),
                ["AVAMET · Estació Alcoi","ECMWF (Model Europeu)","AROME (Alta resolució)"].map(l => h("div", { key:l, className:"flex items-center gap-2 text-sm text-gray-400 mb-3" }, h("div", { className:"w-1.5 h-1.5 bg-[var(--gold-dark)] rounded-full" }), l))
              )
            ),
            h("div", { className:"h-[1px] bg-gradient-to-r from-transparent via-[var(--gold)]/20 to-transparent mb-8" }),
            h("div", { className:"text-center" },
              h("p", { className:"text-xs text-gray-600 mb-2 tracking-wider" }, t.fCopy),
              h("p", { className:"font-serif italic text-[var(--gold)] text-lg" }, t.fVitol)
            )
          )
        );
      }

      /* ═══ APP ROOT ═══ */
      function App() {
        const [scrolled, setScrolled] = useState(false);
        const [lang, setLang] = useState('ca');
        const t = I18N[lang] || I18N['ca'];

        useEffect(() => {
          const handle = () => setScrolled(window.scrollY > 60);
          window.addEventListener("scroll", handle, { passive:true });
          return () => window.removeEventListener("scroll", handle);
        }, []);

        const div = h("div", { className:"gold-div" });
        return h(React.Fragment, null, 
          h(Navbar, { scrolled, lang, setLang, t }),
          h(HeroSection, { t }), div,
          h(MeteoSection, { t }), div,
          h(TimelineSection, { t }), div,
          h(FilaesSection, { t }), div,
          h(CartelSection, { t }), div,
          h(GallerySection, { t }), 
          h(Footer, { t }),
          h(AudioPlayer, { t })
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
