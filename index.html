<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeteoFestes2026 · Moros i Cristians d'Alcoi</title>
    <meta name="description" content="Consulta meteorològica per a les Festes de Moros i Cristians d'Alcoi 2026. Previsions actualitzades amb dades d'AVAMET, Open-Meteo i Meteociel." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --red: #cc0000;
        --red-dark: #8b0000;
        --red-light: #ff3333;
        --gold: #c9a84c;
        --gold-light: #e6c46a;
        --gold-dark: #8a6f28;
        --cream: #fdf6e3;
        --parch: #f0e4c0;
        --dark: #0d0907;
        --dark2: #1a120a;
        --dark3: #2a1c0a;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--dark);
        color: var(--cream);
        font-family: "DM Sans", sans-serif;
        overflow-x: hidden;
      }
      .font-serif {
        font-family: "Playfair Display", serif;
      }
      .font-crim {
        font-family: "Crimson Pro", serif;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--dark);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--gold-dark);
        border-radius: 2px;
      }

      /* ── Hero ── */
      #hero {
        position: relative;
        height: 100svh;
        min-height: 650px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .hero-bg {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            to bottom,
            rgba(13, 9, 7, 0.25) 0%,
            rgba(13, 9, 7, 0.6) 50%,
            rgba(13, 9, 7, 1) 100%
          ),
          radial-gradient(
            ellipse at 50% 30%,
            rgba(201, 168, 76, 0.1) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 70% 60%,
            rgba(204, 0, 0, 0.06) 0%,
            transparent 50%
          ),
          url("https://www.asjordi.org/upload/images/showroom/ano-2025/1903.jpg")
            center/cover no-repeat;
      }
      .hero-particles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: var(--gold);
        border-radius: 50%;
        animation: drift linear infinite;
      }
      @keyframes drift {
        0% {
          transform: translateY(100vh) translateX(0px);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-10vh) translateX(var(--drift-x, 30px));
          opacity: 0;
        }
      }

      /* ── Glassmorphism circle for hero logo ── */
      .hero-logo-glass {
        position: relative;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: rgba(26, 18, 10, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 2px solid rgba(201, 168, 76, 0.35);
        box-shadow:
          0 0 60px rgba(201, 168, 76, 0.1),
          0 0 120px rgba(201, 168, 76, 0.05),
          inset 0 0 40px rgba(201, 168, 76, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        margin: 0 auto 32px;
      }
      .hero-logo-glass img {
        width: 88%;
        height: 88%;
        object-fit: cover;
        border-radius: 50%;
      }

      /* ── Nav ── */
      #navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        transition:
          background 0.4s,
          padding 0.4s,
          backdrop-filter 0.4s;
        padding: 18px 0;
      }
      #navbar.scrolled {
        background: rgba(13, 9, 7, 0.94);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 10px 0;
        border-bottom: 1px solid rgba(201, 168, 76, 0.15);
      }
      .nav-link {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(253, 246, 227, 0.6);
        text-decoration: none;
        transition: color 0.2s;
        cursor: pointer;
        white-space: nowrap;
      }
      .nav-link:hover {
        color: var(--gold-light);
      }

      /* ── Logo in navbar ── */
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        text-decoration: none;
      }
      .nav-logo-img {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        border: 1.5px solid rgba(201, 168, 76, 0.4);
        transition: border-color 0.3s;
      }
      .nav-logo:hover .nav-logo-img {
        border-color: var(--gold);
      }
      .nav-logo-text {
        font-family: "Playfair Display", serif;
        font-size: 1rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: 0.02em;
        line-height: 1;
      }
      .nav-logo-text span {
        color: var(--gold);
      }
      @media (max-width: 480px) {
        .nav-logo-img {
          width: 30px;
          height: 30px;
        }
        .nav-logo-text {
          font-size: 0.85rem;
        }
      }

      /* ── Mobile nav toggle ── */
      .nav-mobile-btn {
        display: none;
        background: none;
        border: none;
        color: var(--gold);
        cursor: pointer;
        padding: 4px;
      }
      @media (max-width: 768px) {
        .nav-mobile-btn {
          display: flex;
        }
        .nav-links-desktop {
          display: none !important;
        }
      }
      .nav-mobile-overlay {
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(13, 9, 7, 0.97);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }
      .nav-mobile-overlay .nav-link {
        font-size: 1rem;
        letter-spacing: 0.25em;
        color: rgba(253, 246, 227, 0.8);
      }

      /* ── Gold divider ── */
      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(201,168,76,.3),
          transparent
        );
      }

      /* ── Section title ── */
      .sec-label {
        font-size: 0.58rem;
        font-weight: 600;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 8px;
      }
      .sec-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 900;
        line-height: 1.1;
        color: var(--cream);
      }
      .sec-title em {
        color: var(--gold);
        font-style: italic;
      }

      /* ── Timeline ── */
      .timeline-connector {
        width: 2px;
        background: rgba(201, 168, 76, 0.25);
        flex-shrink: 0;
      }
      .timeline-dot {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--dark2);
        border: 2px solid var(--gold-dark);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        flex-shrink: 0;
        transition: all 0.3s;
        cursor: pointer;
      }
      .timeline-dot.active {
        background: var(--red);
        border-color: var(--gold);
        box-shadow: 0 0 0 6px rgba(201, 168, 76, 0.15);
        transform: scale(1.1);
      }

      /* ── Filaes ── */
      .fila-card {
        background: rgba(42, 28, 10, 0.5);
        border: 1px solid rgba(201, 168, 76, 0.15);
        border-radius: 10px;
        overflow: hidden;
        transition:
          transform 0.25s,
          border-color 0.25s,
          box-shadow 0.25s;
        cursor: pointer;
        position: relative;
      }
      .fila-card:hover {
        transform: translateY(-6px) scale(1.02);
        border-color: var(--gold);
        box-shadow:
          0 12px 32px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(201, 168, 76, 0.3);
      }
      .fila-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        font-size: 0.48rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 2px 8px;
        border-radius: 3px;
        z-index: 2;
      }
      .badge-cristia {
        background: var(--red);
        color: #fff;
      }
      .badge-moro {
        background: var(--dark2);
        color: var(--gold);
        border: 1px solid var(--gold-dark);
      }
      .cargo-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        font-size: 0.42rem;
        font-weight: 700;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 3px;
        z-index: 2;
        background: linear-gradient(135deg, var(--gold), var(--gold-dark));
        color: var(--dark);
        box-shadow: 0 2px 8px rgba(201,168,76,0.3);
      }

      /* ── Tab buttons ── */
      .tab-btn {
        padding: 8px 24px;
        border-radius: 30px;
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.25s;
        border: 1px solid rgba(201, 168, 76, 0.3);
        background: transparent;
        color: rgba(253, 246, 227, 0.5);
      }
      .tab-btn.active {
        background: var(--red);
        color: #fff;
        border-color: var(--red);
      }

      /* ── Live card ── */
      .live-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        animation: livepulse 2s infinite;
      }
      @keyframes livepulse {
        0%,
        100% {
          box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }
        50% {
          box-shadow: 0 0 0 7px rgba(34, 197, 94, 0.04);
        }
      }

      /* ── Masonry gallery ── */
      .masonry {
        columns: 2;
        gap: 8px;
      }
      .masonry-item {
        break-inside: avoid;
        margin-bottom: 8px;
        overflow: hidden;
        border-radius: 8px;
      }
      .masonry-item img {
        width: 100%;
        display: block;
        transition: transform 0.4s;
      }
      .masonry-item:hover img {
        transform: scale(1.04);
      }
      @media (min-width: 640px) {
        .masonry {
          columns: 3;
        }
      }

      /* ── Fiesta stat ── */
      .fs {
        background: rgba(201, 168, 76, 0.06);
        border-radius: 8px;
        padding: 12px 16px;
        border: 1px solid rgba(201, 168, 76, 0.15);
      }
      .fs-label {
        font-size: 0.5rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.6);
      }
      .fs-val {
        font-family: "Playfair Display", serif;
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--cream);
        line-height: 1;
      }

      /* ── IA Disclaimer panel ── */
      .ia-panel {
        background: linear-gradient(135deg, rgba(42,28,10,.8), rgba(26,18,10,.9));
        border: 1px solid rgba(201, 168, 76, 0.2);
        border-left: 3px solid var(--gold);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 32px;
        position: relative;
        overflow: hidden;
      }
      .ia-panel::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(201,168,76,0.04), transparent 60%);
        pointer-events: none;
      }

      /* ── Cartel frame ── */
      .cartel-frame {
        position: relative;
        background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(138,111,40,0.08));
        border: 2px solid rgba(201, 168, 76, 0.3);
        border-radius: 16px;
        padding: 16px;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.4),
          inset 0 0 60px rgba(201, 168, 76, 0.03);
        max-width: 500px;
        margin: 0 auto;
        overflow: hidden;
      }
      .cartel-frame::before {
        content: "";
        position: absolute;
        inset: 6px;
        border: 1px solid rgba(201, 168, 76, 0.15);
        border-radius: 12px;
        pointer-events: none;
      }
      .cartel-frame img {
        width: 100%;
        border-radius: 10px;
        display: block;
      }

      /* ── Footer ── */
      footer {
        background: linear-gradient(to bottom, var(--dark), #050302);
        border-top: 1px solid rgba(201, 168, 76, 0.15);
        padding: 60px 24px 40px;
      }

      /* ── Glow text ── */
      @keyframes textglow {
        0%, 100% {
          text-shadow: 0 0 20px rgba(201,168,76,0.15);
        }
        50% {
          text-shadow: 0 0 40px rgba(201,168,76,0.25);
        }
      }
      .glow-text {
        animation: textglow 4s ease-in-out infinite;
      }

      /* ── Float animation for hero logo ── */
      @keyframes floater {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .hero-logo-float {
        animation: floater 5s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      const { useState, useEffect, useRef, useCallback } = React;
      const { motion, AnimatePresence, useInView, useScroll, useTransform } =
        window.Motion;

      // ══════════════════════════════════════════════════════
      // DATA
      // ══════════════════════════════════════════════════════

      const TIMELINE = [
        {
          id: 0,
          dia: 24,
          mes: "Abril",
          emoji: "🎵",
          titol: "Dia dels Músics",
          subtitol: "La Festa del Passodoble",
          desc: "La vesprada del dia 24 és un homenatge a les bandes de música, considerades l'ànima de la festa. Les bandes recorren els carrers d'Alcoi en un desfilada musical fins a concentrar-se a la Plaça d'Espanya, on interpreten conjuntament l'Himne de Festes. És la Festa del Passodoble, l'homenatge oficial als músics.",
          color: "#c9a84c",
          detalls: [
            "Desfilada musical per la vesprada",

            "Interpretació conjunta de l'Himne de Festes",
            "Homenatge oficial a les bandes de música",
          ],
        },
        {
          id: 1,
          dia: 25,
          mes: "Abril",
          emoji: "⚔️",
          titol: "Les Entrades",
          subtitol: "Entrada Cristiana i Entrada Mora",
          desc: "El cor de les Festes. A les 10:30h comença l'Entrada Cristiana, que s'inicia al Partidor, passa per Sant Nicolàs i arriba a la Plaça d'Espanya. A les 17:00h, la suntuosa Entrada Mora transforma els carrers en un espectacle de luxe, color i fantasia oriental.",
          color: "#cc0000",
          detalls: [
            "10:30h — Entrada Cristiana des del Partidor",
            "Pas per Sant Nicolàs fins a Plaça d'Espanya",
            "17:00h — Entrada Mora",
            "Desfilada de les 14 filaes de cada bando",
          ],
        },
        {
          id: 2,
          dia: 26,
          mes: "Abril",
          emoji: "✝️",
          titol: "Sant Jordi",
          subtitol: "El dia del Patró",
          desc: "El dia més solemne de les Festes. Se celebra la Missa en honor a Sant Jordi, seguida de la Processó de la Reliquia pel centre d'Alcoi, entre devoció i emoció. Al final del dia, l'Aparició de Sant Jordi sobre les muralles és el moment màgic que la llegenda recorda.",
          color: "#fff",
          detalls: [
            "Missa solemne en honor al Patró",

        {
          id: 3,

          titol: "L'Alardo",
          subtitol: "Dia dels Trons",
          desc: "El tro final. La batalla d'arcabuceria ressona pels carrers principals d'Alcoi en l'espectacular Alardo. Milers de trets d'arcabús omplen l'aire en una jornada d'emoció i pólvora que tanca la trilogia festera.",
          color: "#c9a84c",
          detalls: [
            "Batalla d'arcabuceria pels carrers principals",
            "Alardo Cristià i Alardo Moro",
            "Desfilada final de clausura",
          ],
        },
      ];

      const FILAES = [
        // ── Bando Cristiano ──
        { nom: "Andaluces", tipus: "cristia", cargo: "Capità Cristià" },
        { nom: "Asturianos", tipus: "cristia", cargo: "Alferes Cristià" },
        { nom: "Cides", tipus: "cristia" },
        { nom: "Labradores", tipus: "cristia" },
        { nom: "Guzmanes", tipus: "cristia" },
        { nom: "Vascos", tipus: "cristia" },
        { nom: "Mozárabes", tipus: "cristia" },
        { nom: "Almogávares", tipus: "cristia" },
        { nom: "Navarros", tipus: "cristia" },
        { nom: "Tomasinas", tipus: "cristia" },
        { nom: "Muntanyesos", tipus: "cristia" },
        { nom: "Cruzados", tipus: "cristia" },
        { nom: "Alcodianos", tipus: "cristia" },
        { nom: "Aragoneses", tipus: "cristia" },
        // ── Bando Moro ──
        { nom: "Llana", tipus: "moro", cargo: "Sant Jordiet" },
        { nom: "Judíos", tipus: "moro" },
        { nom: "Domingo Miques", tipus: "moro" },
        { nom: "Chano", tipus: "moro" },
        { nom: "Verdes", tipus: "moro" },
        { nom: "Magenta", tipus: "moro" },
        { nom: "Cordón", tipus: "moro" },
        { nom: "Ligeros", tipus: "moro" },
        { nom: "Mudéjares", tipus: "moro" },
        { nom: "Abencerrajes", tipus: "moro" },
        { nom: "Marrakesch", tipus: "moro", cargo: "Capità Moro" },
        { nom: "Realistas", tipus: "moro", cargo: "Alferes Moro" },
        { nom: "Berberiscos", tipus: "moro" },
        { nom: "Benimerines", tipus: "moro" },
      ];

      const GALLERY = [
        { url: "./foto1.jpg" },
        { url: "./foto2.jpg" },
        { url: "./foto3.jpg" },
        { url: "./foto4.jpg" },
        { url: "./foto5.jpg" },
        { url: "./foto6.jpg" },

        { url: "./foto8.jpg" },
        { url: "./foto9.jpg" },
      ];

      // ══════════════════════════════════════════════════════
      // HELPER: SVG Logo Symbol
      // ══════════════════════════════════════════════════════
      function LogoSVG({ size = 36 }) {
        return React.createElement(
          "svg",
          {
            width: size,
            height: size,
            viewBox: "0 0 48 48",
            fill: "none",
            xmlns: "http://www.w3.org/2000/svg",
          },
          // Shield shape
          React.createElement("path", {
            d: "M24 4L6 12V24C6 34 14 42 24 44C34 42 42 34 42 24V12L24 4Z",
            fill: "rgba(201,168,76,0.12)",
            stroke: "#c9a84c",
            strokeWidth: "1.5",
          }),
          // Cross
          React.createElement("path", {
            d: "M24 14V34M18 24H30",
            stroke: "#c9a84c",
            strokeWidth: "2",
            strokeLinecap: "round",
          }),
          // Crescent
          React.createElement("path", {
            d: "M33 16C30.5 16 28 18 28 21C28 24 30.5 26 33 26C30 26 27 23.5 27 21C27 18.5 30 16 33 16Z",
            fill: "#cc0000",
            opacity: "0.8",
          }),
          // Sun rays
          React.createElement("circle", {
            cx: "15", cy: "20", r: "3",
            fill: "none",
            stroke: "#cc0000",
            strokeWidth: "1",
            opacity: "0.6",
          })
        );
      }

      // ══════════════════════════════════════════════════════
      // COMPONENTS
      // ══════════════════════════════════════════════════════

      function FadeIn({ children, delay = 0, y = 24 }) {
        const ref = useRef(null);
        const inView = useInView(ref, { once: true, margin: "-60px" });
        return React.createElement(
          motion.div,
          {
            ref,
            initial: { opacity: 0, y },
            animate: inView ? { opacity: 1, y: 0 } : {},
            transition: { duration: 0.7, delay, ease: [0.25, 0.1, 0.25, 1] },
          },
          children,
        );
      }

      // ── NAVBAR ──
      function Navbar({ scrolled }) {
        const [mobileOpen, setMobileOpen] = useState(false);
        const scrollTo = (id) => {
          document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
          setMobileOpen(false);
        };

        const navItems = [
          { label: "Meteo", id: "meteo" },
          { label: "Trilogia", id: "trilogia" },
          { label: "Filaes", id: "filaes" },
          { label: "Cartell", id: "cartell" },
