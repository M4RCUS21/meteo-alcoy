    <div id="root"></div>
    <script>
      const { useState, useEffect, useRef } = React;
      const { motion, AnimatePresence, useInView } = window.Motion;
      const h = React.createElement;

      /* ═══ HELPERS N/D ═══ */
      function isND(v) { return v === 'N/D' || v === null || v === undefined; }

      function isOutOfRange(f) {
        return isND(f.temp_max) && (f.icono === '❓' || isND(f.icono));
      }

      function SmartIcon({ f, fontSize }) {
        if (f.icono === '❓' || isOutOfRange(f)) {
          return h('span', { className: 'waiting-icon', style: { fontSize: fontSize || 'inherit' } }, '🔮');
        }
        return h('span', { style: { fontSize: fontSize || 'inherit' } }, f.icono || '🌡️');
      }

      function resolveAnalisis(raw) {
        if (!raw) return { nd: false, text: '' };
        const isWarning = raw.includes('⚠️') || raw.includes('no disponibles') || raw.includes('temporalment') || raw.includes('rango');
        if (isWarning) {
          return {
            nd: true,
            text: 'Fora del rang de 15 dies del model. La previsió s\'activarà automàticament a mesura que la data s\'acoste.',
          };
        }
        return { nd: false, text: raw };
      }

      /* ═══ DATA ═══ */
      const ENTRAETES_INFO = {
        "2026-04-08": [{ carrer: "Sant Nicolau", desfilades: [{ hora: "22:50", fila: "Marrakesch" }, { hora: "23:10", fila: "Asturianos" }, { hora: "23:30", fila: "Andaluces" }] }],
