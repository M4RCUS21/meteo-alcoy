      const { useState, useEffect, useRef } = React;

      /* ═══ HELPERS ═══ */
      function isND(v) { return v === 'N/D' || v === null || v === undefined; }
      function isOutOfRange(f) { return isND(f.temp_max) && (f.icono === '❓' || isND(f.icono)); }

      function SmartIcon({ f, fontSize }) {
        if (f.icono === '❓' || isOutOfRange(f)) {
          return h('span', { className: 'waiting-icon', style: { fontSize: fontSize || 'inherit' } }, '🔮');
        }
        return h('span', { style: { fontSize: fontSize || 'inherit' } }, f.icono || '🌡️');
      }

      function resolveAnalisis(raw) {
        if (!raw) return { nd: false, text: '' };
        if (raw.includes('⚠️') || raw.includes('temporalment') || raw.includes('rango')) {
          return { nd: true, text: 'Fora del rang de 15 dies del model. La previsió s\'activarà pròximament.' };
        }
        return { nd: false, text: raw };
      }

      /* ═══ COMPONENTS ═══ */
      
      // NUEVO: Contador Espectacular
      function Countdown() {
        const [timeLeft, setTimeLeft] = useState({ dies: 0, hores: 0, minuts: 0, segons: 0 });

        useEffect(() => {
          const target = new Date("2026-04-24T00:00:00").getTime();
          const timer = setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff <= 0) {
              clearInterval(timer);
            } else {
              setTimeLeft({
                dies: Math.floor(diff / (1000 * 60 * 60 * 24)),
                hores: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                minuts: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
                segons: Math.floor((diff % (1000 * 60)) / 1000)
              });
            }
          }, 1000);
          return () => clearInterval(timer);
        }, []);

        const Slot = ({ val, lab }) => h('div', { className: 'cd-box flex flex-col items-center' },
          h(motion.span, { 
            key: val, 
            initial: { opacity: 0, y: 5 }, 
            animate: { opacity: 1, y: 0 }, 
            className: 'cd-num' 
          }, val.toString().padStart(2, '0')),
          h('span', { className: 'cd-lab' }, lab)
        );

        return h('div', { className: 'flex gap-3 justify-center mt-8 mb-4' },
          h(Slot, { val: timeLeft.dies, lab: 'Dies' }),
          h(Slot, { val: timeLeft.hores, lab: 'Hores' }),
          h(Slot, { val: timeLeft.minuts, lab: 'Minuts' }),
          h(Slot, { val: timeLeft.segons, lab: 'Segons' })
        );
      }

        ],

        "2026-04-15": [{ carrer: "Sant Nicolau", desfilades: [{ hora: "22:30", fila: "Alcodianos" }, { hora: "22:50", fila: "Abencerrajes" }, { hora: "23:10", fila: "Navarros" }, { hora: "23:30", fila: "Berberiscos" }] }],
