<style>
:root {
  --red: #cc0000; --red-dark: #8b0000; --red-light: #ff3333;

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--dark); color: var(--cream); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
.font-serif { font-family: 'Playfair Display', serif; }
.font-crim  { font-family: 'Crimson Pro', serif; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

/* ── Hero ── */
#hero {
  position: relative; height: 100svh; min-height: 600px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(21,14,5,.3) 0%, rgba(21,14,5,.7) 60%, rgba(21,14,5,1) 100%),
    radial-gradient(ellipse at 60% 40%, rgba(201,168,76,.12) 0%, transparent 70%),
    url('https://www.asjordi.org/upload/images/showroom/ano-2025/1903.jpg') center/cover no-repeat;
}
.hero-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.particle {
  position: absolute; width: 2px; height: 2px;
  background: var(--gold); border-radius: 50%;
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { transform: translateY(100vh) translateX(0px); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(-10vh) translateX(var(--drift-x, 30px)); opacity: 0; }
}

/* ── Nav ── */
#navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  transition: background .4s, padding .4s, backdrop-filter .4s;
  padding: 20px 0;
}
#navbar.scrolled {
  background: rgba(21,14,5,.92);
  backdrop-filter: blur(12px);
  padding: 10px 0;
  border-bottom: 1px solid rgba(201,168,76,.2);
}
.nav-link {
  font-size: .7rem; font-weight: 600; letter-spacing: .18em;
  text-transform: uppercase; color: rgba(253,246,227,.7);
  text-decoration: none; transition: color .2s;
  cursor: pointer;
}
.nav-link:hover { color: var(--gold-light); }

/* ── Gold divider ── */
.divider {
  height: 1px; margin: 0 auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: .4;
}

/* ── Section title ── */
.sec-label {
  font-size: .6rem; font-weight: 600; letter-spacing: .35em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.sec-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 900; line-height: 1.1;
  color: var(--cream);
}
.sec-title em { color: var(--gold); font-style: italic; }

/* ── Timeline ── */
.timeline-item { cursor: pointer; }
.timeline-connector { width: 2px; background: rgba(201,168,76,.25); flex-shrink: 0; }
.timeline-dot {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--dark2); border: 2px solid var(--gold-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
  transition: all .3s; cursor: pointer;
}
.timeline-dot.active {
  background: var(--red); border-color: var(--gold);
  box-shadow: 0 0 0 6px rgba(201,168,76,.15);
  transform: scale(1.1);
}

  background: rgba(42,28,10,.7);

  border-left: 3px solid var(--gold);
  border-radius: 12px; padding: 20px; flex: 1;

  transition: border-color .3s;

.timeline-card.active { border-left-color: var(--red); border-color: rgba(204,0,0,.4); }

/* ── Filaes ── */
.fila-card {
  background: rgba(42,28,10,.5);
  border: 1px solid rgba(201,168,76,.15);
  border-radius: 10px; overflow: hidden;
  transition: transform .25s, border-color .25s, box-shadow .25s;

.fila-card:hover {
  transform: translateY(-6px) scale(1.02);

  box-shadow: 0 12px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(201,168,76,.3);

.fila-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
.fila-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: .5rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; padding: 2px 8px; border-radius: 3px;

.badge-cristia { background: var(--red); color: #fff; }
.badge-moro    { background: var(--dark2); color: var(--gold); border: 1px solid var(--gold-dark); }

/* ── Tab buttons ── */
.tab-btn {
  padding: 8px 24px; border-radius: 30px; font-size: .7rem;
  font-weight: 600; letter-spacing: .15em; text-transform: uppercase;
  cursor: pointer; transition: all .25s;
  border: 1px solid rgba(201,168,76,.3);
  background: transparent; color: rgba(253,246,227,.5);
}
.tab-btn.active {
  background: var(--red); color: #fff; border-color: var(--red);

/* ── Live card ── */
.live-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
  animation: livepulse 2s infinite;
}
@keyframes livepulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
  50%      { box-shadow: 0 0 0 7px rgba(34,197,94,.04); }

/* ── Masonry gallery ── */
.masonry { columns: 2; gap: 8px; }
.masonry-item { break-inside: avoid; margin-bottom: 8px; overflow: hidden; border-radius: 8px; }
.masonry-item img { width: 100%; display: block; transition: transform .4s; }
.masonry-item:hover img { transform: scale(1.04); }
@media (min-width: 640px) { .masonry { columns: 3; } }

/* ── Video placeholder ── */

  aspect-ratio: 16/9; background: var(--dark2);
  border: 1px solid rgba(201,168,76,.2);

footer {

/* ── Scroll reveal wrapper ── */
.reveal { opacity: 0; transform: translateY(30px); transition: opacity .7s ease, transform .7s ease; }
.reveal.visible { opacity: 1; transform: none; }
