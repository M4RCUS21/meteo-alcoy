/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

/* ═══════════════════════════════════════════

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */

function Countdown({ t }) {
  const calc = useCallback(() => {
    const d = new Date("2026-04-24T00:00:00") - Date.now();
    if(d <= 0) return null;
    return { d: Math.floor(d/864e5), h: Math.floor((d/36e5)%24), m: Math.floor((d/6e4)%60), s: Math.floor((d/1e3)%60) };
  }, []);
  const [rem, setRem] = useState(calc);
  useEffect(() => { const id=setInterval(()=>setRem(calc()),1000); return ()=>clearInterval(id); }, [calc]);

  if(!rem) return h("div", {className:"text-2xl font-serif italic text-[var(--accent-gold)] mt-8"}, t.cdDone);
  const units = [{v:rem.d, l:t.cdLabels[0]}, {v:rem.h, l:t.cdLabels[1]}, {v:rem.m, l:t.cdLabels[2]}, {v:rem.s, l:t.cdLabels[3], blink:true}];

  return h("div", {className:"cd-wrap"},
    units.map((u,i) => h(React.Fragment, {key:u.l},
      h("div", {className:`cd-block ${u.blink?'blink-bg':''}`, key:u.blink?u.v:u.l},
        h("div", {className:"cd-num"}, String(u.v).padStart(2,"0")),
        h("div", {className:"cd-lbl"}, u.l)
      ),
      i<3 && h("div", {className:"cd-sep"}, ":")
    ))
  );
}

function AudioPlayer({ t }) {
  const {isPlaying, setPlaying, cur, nextTrack, volume, setVolume, muted, setMuted} = useAudio();
  const aRef = useRef(null);
  const [toast, setToast] = useState(false);
  const prevCur = useRef(-1);

  useEffect(() => {
    if(isPlaying && cur !== prevCur.current) {
      prevCur.current = cur;
      setToast(false);
      const a = setTimeout(()=>setToast(true),80);
      const b = setTimeout(()=>setToast(false),4200);
      return ()=>{clearTimeout(a);clearTimeout(b);};
    }
  }, [cur, isPlaying]);

  useEffect(() => {
    const init = () => {
      if(!isPlaying && aRef.current) { aRef.current.play().then(()=>{setPlaying(true); setToast(true); setTimeout(()=>setToast(false),4000);}).catch(()=>{}); }
      window.removeEventListener('click', init);
    };
    window.addEventListener('click', init);
    return () => window.removeEventListener('click', init);
  }, [isPlaying]);

  return h(React.Fragment, null,
    h("audio", {ref:aRef, src:PLAYLIST[cur].file, volume:muted?0:volume, onEnded:nextTrack, autoPlay:isPlaying}),
    
    h("div", {className:"player"},
