<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo Alcoi 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
    </style>
</head>
<body class="text-slate-200 p-4">
    <div class="max-w-md mx-auto">
        <header class="text-center py-8">
            <h1 class="text-4xl font-900 tracking-tighter uppercase text-white">Meteo <span class="text-sky-400">Festes</span></h1>
            <p class="text-slate-500 text-xs font-bold tracking-widest uppercase">Alcoi 2026 · 750 Aniversari</p>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700 backdrop-blur-sm text-center">
                <p class="text-[10px] text-slate-500 font-black uppercase mb-2">Temperatura</p>
                <p class="text-4xl font-black italic text-white"><span id="temp">--</span>°</p>
            </div>
            <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700 backdrop-blur-sm text-center">
                <p class="text-[10px] text-slate-500 font-black uppercase mb-2">Humitat</p>
                <p class="text-4xl font-black italic text-white"><span id="hum">--</span>%</p>
            </div>
        </div>

        <div class="bg-sky-500/10 rounded-3xl border border-sky-500/20 p-5 mb-6">
            <h2 class="text-center text-[10px] font-black uppercase text-sky-400 mb-4 tracking-widest italic">Anàlisi de la Trilogia</h2>
            <div id="contenedor-fiestas" class="space-y-3">
                </div>
        </div>

        <div class="bg-slate-800/50 rounded-3xl border border-slate-700 overflow-hidden shadow-2xl mb-8">
            <div class="p-3 bg-slate-700/30 text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Model GEFS (T850 + T500 + Prec)</p>
            </div>
            <img id="mapa" src="" alt="Cargando mapa..." class="w-full h-auto grayscale-[0.2] contrast-125">
        </div>

        <footer class="text-center pb-10">
            <p class="text-[9px] text-slate-600 uppercase font-bold tracking-widest italic">Actualitzat: <span id="fecha" class="text-slate-400">--</span></p>
        </footer>
    </div>

    <script>
        async function updateApp() {
            try {
                const res = await fetch('datos.json?v=' + Date.now());
                const data = await res.json();

                // Datos cabecera
                document.getElementById('temp').innerText = data.temp;
                document.getElementById('hum').innerText = data.hum;
                document.getElementById('mapa').src = data.mapa_url;
                document.getElementById('fecha').innerText = new Date(data.fecha).toLocaleString('es-ES');

                // Días de Fiestas
                const container = document.getElementById('contenedor-fiestas');
                container.innerHTML = '';
                
                data.fiestas.forEach(dia => {
                    const card = `
                        <div class="flex items-center justify-between bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-slate-500 uppercase">${dia.dia.split(' - ')[0]}</span>
                                <span class="text-xs font-bold text-white">${dia.dia.split(' - ')[1]}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-2xl">${dia.icono}</span>
                                <div class="text-right">
                                    <span class="block text-sm font-black text-white">${dia.temp_max}°C</span>
                                    <span class="block text-[8px] font-bold text-sky-400 uppercase italic">${dia.consejo}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

            } catch (e) { console.error("Error:", e); }
        }
        updateApp();
    </script>
</body>
</html>
