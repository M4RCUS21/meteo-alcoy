<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeteoFestes2026 · Moros i Cristians d'Alcoi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --red: #cc0000; --red-dark: #8b0000; --gold: #c9a84c; --gold-light: #e6c46a;
        --cream: #fdf6e3; --dark: #0b0806; --dark2: #16100a;
        --dark-card: rgba(35, 26, 14, 0.72);
        --green-moro: #166534;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--dark); color: var(--cream); font-family: "DM Sans", sans-serif; overflow-x: hidden; }
      .font-serif { font-family: "Playfair Display", serif; }
      .font-crim  { font-family: "Crimson Pro", serif; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* NAVBAR SCROLL */
      #navbar.scrolled { background: rgba(11,8,6,.92); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(201,168,76,.12); }
      .nav-logo-img { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid rgba(201,168,76,.35); }

      /* CARDS */
      .hero-card, .countdown-card { position: relative; background: linear-gradient(145deg, rgba(35,26,14,.82), rgba(16,12,6,.92)); border: 1.5px solid rgba(201,168,76,.32); border-radius: 18px; padding: 24px; transition: all .35s ease; cursor: pointer; }
      .hero-card:hover, .countdown-card:hover { transform: translateY(-6px); border-color: var(--gold); box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
      .hero-card.out-of-range { border-style: dashed; opacity: 0.7; cursor: default; }

      /* BADGES FILAES */
      .fila-badge { position: absolute; top: 8px; right: 8px; font-size: .44rem; font-weight: 800; padding: 2px 8px; border-radius: 4px; color: #fff; }
      .badge-c { background: var(--red); }
      .badge-m { background: var(--green-moro); } /* VERDE MORO */

      /* COUNTDOWN HERO */
      .cd-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 12px; padding: 12px; min-width: 75px; text-align: center; }
      .cd-num { font-family: "Playfair Display", serif; font-size: 2rem; font-weight: 900; color: var(--gold-light); line-height: 1; }
      .cd-lab { font-size: 0.5rem; font-weight: 700; text-transform: uppercase; color: rgba(253,246,227,0.4); margin-top: 4px; }

      /* CTA */
      .card-cta { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: rgba(201,168,76,0.5); margin-top: 12px; border-top: 1px solid rgba(201,168,76,0.1); padding-top: 10px; display: flex; align-items: center; gap: 4px; }
      .hero-card:hover .card-cta { color: var(--gold); }

      /* MODAL */
      .modal-card { background: rgba(22,16,10,0.98); border: 1px solid var(--gold); box-shadow: 0 0 50px rgba(0,0,0,0.8); }
      .hourly-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,168,76,0.1); border-radius: 12px; min-width: 85px; padding: 12px; display: flex; flex-direction: column; align-items: center; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const { useState, useEffect, useRef } = React;
      const { motion, AnimatePresence, useInView } = window.Motion;
      const h = React.createElement;

      /* ═══ HELPERS ═══ */
      function isND(v) { return v === 'N/D' || v === null || v === undefined; }
      function isOutOfRange(f) { return isND(f.temp_max) || f.analisis_tecnico?.includes('rang'); }

      /* ═══ ANIMATION COMPONENT (FIXED ERROR) ═══ */
      function FadeIn({ children, delay = 0, y = 20 }) {
        const ref = useRef(null);
        const vis = useInView(ref, { once: true, margin: "-50px" });
        return h(motion.div, {
          ref,
          initial: { opacity: 0, y },
          animate: vis ? { opacity: 1, y: 0 } : {},
          transition: { duration: 0.6, delay, ease: "easeOut" },
        }, children);
      }

      /* ═══ SMART ICON ═══ */
      function SmartIcon({ f, fontSize }) {
        if (isOutOfRange(f)) return h('span', { className: 'waiting-icon', style: { fontSize } }, '🔮');
        return h('span', { style: { fontSize } }, f.icono || '🌡️');
      }

      /* ═══ COUNTDOWN COMPONENT ═══ */
      function Countdown() {
        const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
        useEffect(() => {
          const target = new Date("2026-04-24T00:00:00").getTime();
          const timer = setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff > 0) {
              setTimeLeft({
                d: Math.floor(diff / 86400000),
                h: Math.floor((diff % 86400000) / 3600000),
                m: Math.floor((diff % 3600000) / 60000),
                s: Math.floor((diff % 60000) / 1000)
              });
            }
          }, 1000);
          return () => clearInterval(timer);
        }, []);
        const Box = (v, l) => h('div', { className: 'cd-box' }, h('div', { className: 'cd-num' }, v), h('div', { className: 'cd-lab' }, l));
        return h('div', { className: 'flex gap-2 justify-center mt-6' }, Box(timeLeft.d, 'Dies'), Box(timeLeft.h, 'Hores'), Box(timeLeft.m, 'Min'), Box(timeLeft.s, 'Seg'));
      }

      /* ═══ DATA ═══ */
      const FILAES = [
        { nom:"Andaluces", tipus:"cristia", img:"https://www.asjordi.org/upload/images/showroom/ano-2025/1452.jpg" },
        { nom:"Asturianos", tipus:"cristia", img:"https://www.asjordi.org/upload/images/showroom/ano-2025/1371.jpg" },
        { nom:"Berberiscos", tipus:"moro", img:"https://www.asjordi.org/upload/images/showroom/ano-2025/1684.jpg" }, // FOTO CORREGIDA
        { nom:"Benimerines", tipus:"moro", img:"https://www.asjordi.org/upload/images/showroom/ano-2025/1670.jpg" },
        { nom:"Marrakesch", tipus:"moro", img:"https://www.asjordi.org/upload/images/showroom/ano-2025/1775.jpg" },
        { nom:"Realistas", tipus:"moro", img:"https://www.asjordi.org/upload/images/showroom/ano-2025/1695.jpg" },
        // ... añadir resto si es necesario
      ];

      const ENTRAETES_INFO = {
        "2026-04-13": [{ carrer: "Sant Nicolau", desfilades: [{ hora: "22:50", fila: "Marrakesch" }] }],
        "2026-04-14": [{ carrer: "Sant Nicolau", desfilades: [{ hora: "23:10", fila: "Mudéjares" }] }],
        // ... (resto de info)
      };

      /* ═══ SECTIONS ═══ */
      function HeroSection() {
        return h("section", { id:"hero" },
          h("div", { className:"hero-bg" }),
          h("div", { style:{ position:"relative", zIndex:2, textAlign:"center" } },
            h(FadeIn, null, h("div", { className:"hero-glass" }, h("img", { src:"./logo.png", alt:"Logo" }))),
            h("h1", { className:"font-serif text-5xl font-black text-white" }, "Meteo ", h("em", { className:"text-[var(--gold)]" }, "Festes")),
            h("p", { className:"font-crim italic text-xl text-gray-300" }, "Compte enrere per a la Trilogia 2026"),
            h(Countdown)
          )
        );
      }

      function MeteoSection() {
        const [meteo, setMeteo] = useState(null);
        const [selectedDay, setSelectedDay] = useState(null);

        useEffect(() => {
          fetch("./datos.json?v=" + Date.now())
            .then(r => r.json())
            .then(setMeteo)
            .catch(e => console.error("Error cargando JSON", e));
        }, []);

        if (!meteo) return h('div', { className: 'text-center py-20' }, 'Carregant dades...');

        const diesGrans = (meteo.fiestas || []).filter(f => f.fecha.includes('-24') || f.fecha.includes('-25') || f.fecha.includes('-26') || f.fecha.includes('-27'));
        const entraetes = (meteo.fiestas || []).filter(f => !diesGrans.includes(f) && !isOutOfRange(f));

        return h("section", { id: "meteo", className: "py-20 px-6" },
          h("div", { className: "max-w-5xl mx-auto" },
            h(FadeIn, null, h("h2", { className: "sec-title text-center mb-12" }, "Previsió ", h("em", null, "Detallada"))),
            
            /* GRID DIES GRANS */
            h("div", { className: "grid grid-cols-1 md:grid-cols-2 gap-6 mb-12" },
              diesGrans.map((f, i) => {
                const oor = isOutOfRange(f);
                return h(motion.div, { 
                  key: f.fecha, 
                  className: "hero-card" + (oor ? " out-of-range" : ""),
                  onClick: () => !oor && setSelectedDay(f)
                },
                  h("div", { className: "flex justify-between items-start" },
                    h("div", null, 
                      h("div", { className: "text-[var(--gold)] text-xs font-bold uppercase" }, f.dia.split('·')[0]),
                      h("div", { className: "text-4xl font-black" }, f.fecha.split('-')[2])
                    ),
                    h(SmartIcon, { f, fontSize: "2.5rem" })
                  ),
                  h("div", { className: "font-serif text-lg mt-2 mb-4" }, f.dia.split('·')[1]),
                  !oor && h("div", { className: "card-cta" }, "⏱️ Veure previsió per hores ", h("span", null, "→"))
                );
              })
            ),

            /* MODAL DETALLE HORAS */
            h(AnimatePresence, null,
              selectedDay && h(motion.div, { 
                className: "fixed inset-0 z-[2000] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm",
                initial: { opacity: 0 }, animate: { opacity: 1 }, exit: { opacity: 0 },
                onClick: () => setSelectedDay(null)
              },
                h(motion.div, { 
                  className: "modal-card w-full max-w-xl p-8 rounded-3xl relative",
                  initial: { y: 50 }, animate: { y: 0 }, exit: { y: 50 },
                  onClick: e => e.stopPropagation()
                },
                  h("button", { className: "absolute top-6 right-6 text-2xl", onClick: () => setSelectedDay(null) }, "✕"),
                  h("h3", { className: "font-serif text-2xl font-bold mb-6" }, selectedDay.dia),
                  h("div", { className: "flex gap-4 overflow-x-auto hide-scrollbar pb-4" },
                    (selectedDay.horas || []).map((hData, idx) => h("div", { key: idx, className: "hourly-card" },
                      h("span", { className: "font-mono text-xs text-[var(--gold)] mb-2" }, hData.hora),
                      h("span", { className: "text-3xl mb-2" }, hData.icono),
                      h("span", { className: "text-xl font-bold" }, hData.temp + "°")
                    ))
                  )
                )
              )
            )
          )
        );
      }

      function FilaesSection() {
        return h("section", { id: "filaes", className: "py-20 bg-black/20" },
          h("div", { className: "max-w-6xl mx-auto px-6" },
            h(FadeIn, null, h("h2", { className: "sec-title text-center mb-12" }, "Les ", h("em", null, "Filaes"))),
            h("div", { className: "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4" },
              FILAES.map(f => h("div", { key: f.nom, className: "fila-card" },
                h("img", { src: f.img, className: "w-full aspect-[3/4] object-cover" }),
                h("div", { className: "fila-badge " + (f.tipus === 'cristia' ? 'badge-c' : 'badge-m') }, f.tipus === 'cristia' ? 'C' : 'M'),
                h("div", { className: "p-3 text-center font-bold text-[0.7rem] uppercase" }, f.nom)
              ))
            )
          )
        );
      }

      function App() {
        const [scrolled, setScrolled] = useState(false);
        useEffect(() => {
          const handle = () => setScrolled(window.scrollY > 50);
          window.addEventListener("scroll", handle);
          return () => window.removeEventListener("scroll", handle);
        }, []);

        return h(React.Fragment, null,
          h(Navbar, { scrolled }),
          h(HeroSection),
          h(MeteoSection),
          h(FilaesSection)
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
