<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeteoFestes2026 · Moros i Cristians d'Alcoi</title>
    <meta
      name="description"
      content="Consulta meteorològica per a les Festes de Moros i Cristians d'Alcoi 2026. Previsions actualitzades amb dades d'AVAMET, ECMWF i AROME."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --red: #cc0000;
        --red-dark: #8b0000;
        --red-light: #ff3333;
        --gold: #c9a84c;
        --gold-light: #e6c46a;
        --gold-dark: #8a6f28;
        --cream: #fdf6e3;
        --parch: #f0e4c0;
        --dark: #0b0806;
        --dark2: #16100a;
        --dark3: #231a0e;
        --dark-card: rgba(35, 26, 14, 0.72);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--dark);
        color: var(--cream);
        font-family: "DM Sans", sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .font-serif {
        font-family: "Playfair Display", serif;
      }
      .font-crim {
        font-family: "Crimson Pro", serif;
      }
      .font-mono {
        font-family: "DM Mono", monospace;
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--dark);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--gold-dark);
        border-radius: 4px;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* ── COUNTDOWN ── */
      .countdown-hero {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin: 28px 0 36px;
      }
      .cd-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(201, 168, 76, 0.28);
        border-radius: 12px;
        padding: 14px 18px 10px;
        min-width: 72px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        position: relative;
        overflow: hidden;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(201, 168, 76, 0.12);
      }
      .cd-block::before {
        content: "";
        position: absolute;
        top: 0;
        left: 15%;
        right: 15%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(201, 168, 76, 0.55),
          transparent
        );
      }
      .cd-num {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(
          160deg,
          var(--gold-light) 0%,
          var(--gold) 50%,
          var(--gold-dark) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        min-width: 2ch;
        text-align: center;
      }
      .cd-label {
        font-size: 0.44rem;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.5);
        margin-top: 6px;
      }
      .cd-sep {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.4rem, 4vw, 2rem);
        font-weight: 900;
        color: rgba(201, 168, 76, 0.3);
        align-self: center;
        padding-bottom: 14px;
        user-select: none;
      }
      .cd-finished {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.1rem, 3vw, 1.6rem);
        font-style: italic;
        color: var(--gold);
        margin: 20px 0 36px;
        letter-spacing: 0.04em;
      }
      @media (max-width: 420px) {
        .cd-block {
          min-width: 58px;
          padding: 10px 12px 8px;
        }
        .countdown-hero {
          gap: 6px;
        }
        .cd-sep {
          font-size: 1.2rem;
        }
      }

      /* ── CTA MODAL HOVER ── */
      .card-cta-hint {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.5);
        padding: 10px 16px 0;
        border-top: 1px solid rgba(201, 168, 76, 0.08);
        margin-top: 14px;
        transition: color 0.25s;
        user-select: none;
        position: relative;
        z-index: 1;
      }
      .card-cta-arrow {
        display: inline-block;
        transition: transform 0.25s;
      }
      .hero-card:hover .card-cta-hint {
        color: var(--gold-light);
      }
      .hero-card:hover .card-cta-arrow {
        transform: translateX(4px);
      }
      .countdown-card:hover .card-cta-hint {
        color: var(--gold-light);
      }
      .countdown-card:hover .card-cta-arrow {
        transform: translateX(4px);
      }

      /* NAVBAR */
      #navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        transition:
          background 0.4s,
          padding 0.4s,
          backdrop-filter 0.4s,
          box-shadow 0.4s;
        padding: 16px 0;
      }
      #navbar.scrolled {
        background: rgba(11, 8, 6, 0.92);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        padding: 8px 0;
        border-bottom: 1px solid rgba(201, 168, 76, 0.12);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.35);
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        text-decoration: none;
        user-select: none;
      }
      .nav-logo-img {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        object-fit: cover;
        border: 1.5px solid rgba(201, 168, 76, 0.35);
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
        background: var(--dark2);
      }
      .nav-logo:hover .nav-logo-img {
        border-color: var(--gold);
        box-shadow: 0 0 12px rgba(201, 168, 76, 0.2);
      }
      .nav-logo-text {
        font-family: "Playfair Display", serif;
        font-size: 1.05rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: 0.02em;
        line-height: 1;
      }
      .nav-logo-text span {
        color: var(--gold);
      }
      .nav-link {
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(253, 246, 227, 0.55);
        text-decoration: none;
        transition: color 0.25s;
        cursor: pointer;
        white-space: nowrap;
        position: relative;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        bottom: -3px;
        left: 0;
        width: 0;
        height: 1px;
        background: var(--gold);
        transition: width 0.3s;
      }
      .nav-link:hover {
        color: var(--gold-light);
      }
      .nav-link:hover::after {
        width: 100%;
      }
      .nav-hamburger {
        display: none;
        background: none;
        border: none;
        color: var(--gold);
        cursor: pointer;
        padding: 4px;
      }
      @media (max-width: 768px) {
        .nav-hamburger {
          display: flex;
          align-items: center;
        }
        .nav-desk {
          display: none !important;
        }
        .nav-logo-img {
          width: 32px;
          height: 32px;
        }
        .nav-logo-text {
          font-size: 0.9rem;
        }
      }
      .mobile-overlay {
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(11, 8, 6, 0.97);
        backdrop-filter: blur(24px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
      }
      .mobile-overlay .nav-link {
        font-size: 1rem;
        letter-spacing: 0.28em;
        color: rgba(253, 246, 227, 0.75);
      }

      /* HERO */
      #hero {
        position: relative;
        height: 100svh;
        min-height: 660px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .hero-bg {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            to bottom,
            rgba(11, 8, 6, 0.2) 0%,
            rgba(11, 8, 6, 0.55) 45%,
            rgba(11, 8, 6, 1) 100%
          ),
          radial-gradient(
            ellipse at 50% 25%,
            rgba(201, 168, 76, 0.08) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 70% 65%,
            rgba(204, 0, 0, 0.04) 0%,
            transparent 45%
          ),
          url("https://www.asjordi.org/upload/images/showroom/ano-2025/1903.jpg")
            center/cover no-repeat;
      }
      .hero-particles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .particle {
        position: absolute;
        border-radius: 50%;
        background: var(--gold);
        animation: drift linear infinite;
      }
      @keyframes drift {
        0% {
          transform: translateY(100vh) translateX(0);
          opacity: 0;
        }
        8% {
          opacity: 0.8;
        }
        92% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(-10vh) translateX(var(--dx, 30px));
          opacity: 0;
        }
      }
      .hero-glass {
        width: 190px;
        height: 190px;
        border-radius: 50%;
        background: rgba(22, 16, 10, 0.35);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        border: 2px solid rgba(201, 168, 76, 0.3);
        box-shadow:
          0 0 80px rgba(201, 168, 76, 0.08),
          0 0 160px rgba(201, 168, 76, 0.04),
          inset 0 0 50px rgba(201, 168, 76, 0.04);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        margin: 0 auto 28px;
      }
      .hero-glass img {
        width: 85%;
        height: 85%;
        object-fit: cover;
        border-radius: 50%;
      }
      @keyframes heroFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      .hero-float {
        animation: heroFloat 5s ease-in-out infinite;
      }
      @keyframes glowPulse {
        0%,
        100% {
          text-shadow: 0 0 20px rgba(201, 168, 76, 0.12);
        }
        50% {
          text-shadow: 0 0 50px rgba(201, 168, 76, 0.22);
        }
      }
      .glow {
        animation: glowPulse 4s ease-in-out infinite;
      }
      .gold-div {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(201, 168, 76, 0.25),
          transparent
        );
      }

      /* SECTION TITLES */
      .sec-label {
        font-size: 0.55rem;
        font-weight: 600;
        letter-spacing: 0.38em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 8px;
      }
      .sec-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 900;
        line-height: 1.08;
        color: var(--cream);
      }
      .sec-title em {
        color: var(--gold);
        font-style: italic;
      }
      .guide-card {
        background: linear-gradient(
          135deg,
          rgba(35, 26, 14, 0.65),
          rgba(22, 16, 10, 0.85)
        );
        border: 1px solid rgba(201, 168, 76, 0.18);
        border-radius: 12px;
        padding: 24px;
        transition:
          transform 0.25s,
          border-color 0.25s;
      }
      .guide-card:hover {
        transform: translateY(-4px);
        border-color: rgba(201, 168, 76, 0.35);
      }

      /* IA PANEL */
      .ia-panel {
        background: linear-gradient(
          135deg,
          rgba(35, 26, 14, 0.85),
          rgba(22, 16, 10, 0.92)
        );
        border: 1px solid rgba(201, 168, 76, 0.18);
        border-left: 3px solid var(--gold);
        border-radius: 14px;
        padding: 26px;
        margin-bottom: 36px;
        position: relative;
        overflow: hidden;
      }
      .ia-panel::before {
        content: "";
        position: absolute;
        top: -40%;
        right: -40%;
        width: 80%;
        height: 80%;
        background: radial-gradient(
          circle,
          rgba(201, 168, 76, 0.035),
          transparent 60%
        );
        pointer-events: none;
      }

      /* MODEL BADGES */
      .model-badge {
        font-size: 0.42rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 2px 6px;
        border-radius: 4px;
        display: inline-block;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }
      .model-badge.ecmwf {
        background: rgba(201, 168, 76, 0.15);
        color: var(--gold-light);
        border: 1px solid rgba(201, 168, 76, 0.3);
      }
      .model-badge.arome {
        background: rgba(204, 0, 0, 0.15);
        color: #ff6b6b;
        border: 1px solid rgba(204, 0, 0, 0.3);
      }

      /* LIVE */
      .live-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
        }
        50% {
          box-shadow: 0 0 0 7px rgba(34, 197, 94, 0.04);
        }
      }
      .fs {
        background: rgba(201, 168, 76, 0.05);
        border-radius: 8px;
        padding: 12px 16px;
        border: 1px solid rgba(201, 168, 76, 0.12);
      }
      .fs-label {
        font-size: 0.48rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.55);
      }
      .fs-val {
        font-family: "Playfair Display", serif;
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--cream);
        line-height: 1;
      }

      /* HERO-CARDS */
      .hero-card {
        position: relative;
        background: linear-gradient(
          145deg,
          rgba(35, 26, 14, 0.82),
          rgba(16, 12, 6, 0.92)
        );
        border: 1.5px solid rgba(201, 168, 76, 0.32);
        border-radius: 18px;
        padding: 28px 24px 18px;
        overflow: hidden;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        transition:
          transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1),
          border-color 0.35s,
          box-shadow 0.35s;
      }
      .hero-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 30% 20%,
            rgba(201, 168, 76, 0.06),
            transparent 60%
          ),
          radial-gradient(
            ellipse at 80% 80%,
            rgba(204, 0, 0, 0.03),
            transparent 50%
          );
        pointer-events: none;
      }
      .hero-card::after {
        content: "";
        position: absolute;
        top: -1px;
        left: 20%;
        right: 20%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(201, 168, 76, 0.5),
          transparent
        );
      }
      .hero-card:hover {
        transform: translateY(-6px) scale(1.015);
        border-color: rgba(201, 168, 76, 0.55);
        box-shadow:
          0 18px 50px rgba(0, 0, 0, 0.5),
          0 0 40px rgba(201, 168, 76, 0.08),
          inset 0 0 30px rgba(201, 168, 76, 0.02);
      }
      .hero-card.out-of-range {
        border-style: dashed;
        border-color: rgba(201, 168, 76, 0.16);
        background: linear-gradient(
          145deg,
          rgba(18, 12, 7, 0.7),
          rgba(10, 7, 4, 0.82)
        );
      }
      .hero-card.out-of-range::after {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(201, 168, 76, 0.14),
          transparent
        );
      }
      .hero-card.out-of-range:hover {
        transform: translateY(-3px) scale(1.005);
        border-color: rgba(201, 168, 76, 0.26);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
      }
      .hero-card .hc-day {
        font-family: "Playfair Display", serif;
        font-size: 3.4rem;
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(
          135deg,
          var(--gold-light),
          var(--gold),
          var(--gold-dark)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero-card .hc-icon {
        font-size: 2.8rem;
        filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
        line-height: 1;
      }
      .hero-card .hc-temp {
        font-family: "Playfair Display", serif;
        font-size: 2.6rem;
        font-weight: 900;
        color: var(--cream);
        line-height: 1;
      }
      .hero-card .hc-event {
        font-family: "Playfair Display", serif;
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--cream);
        line-height: 1.2;
      }
      .hero-card .hc-weekday {
        font-size: 0.5rem;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--gold);
        opacity: 0.7;
      }
      .hero-card .hc-stat {
        background: rgba(201, 168, 76, 0.06);
        border: 1px solid rgba(201, 168, 76, 0.12);
        border-radius: 10px;
        padding: 10px 8px;
        text-align: center;
      }
      .hero-card .hc-stat-label {
        font-size: 0.42rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.45);
        margin-bottom: 3px;
      }
      .hero-card .hc-stat-val {
        font-family: "Playfair Display", serif;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--cream);
      }
      .hero-card .hc-stat-val.nd {
        opacity: 0.28;
        font-size: 0.82rem;
        letter-spacing: 0.18em;
      }
      .hero-card .hc-analysis {
        font-family: "Crimson Pro", serif;
        font-size: 0.82rem;
        line-height: 1.6;
        color: rgba(253, 246, 227, 0.58);
        border-left: 3px solid;
        padding-left: 12px;
      }
      .hero-card .hc-analysis.nd-warning {
        font-size: 0.72rem;
        font-style: italic;
        color: rgba(253, 246, 227, 0.32);
        border-left-color: rgba(201, 168, 76, 0.16) !important;
      }
      .soon-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.4rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.42);
        background: rgba(201, 168, 76, 0.05);
        border: 1px dashed rgba(201, 168, 76, 0.18);
        padding: 3px 9px;
        border-radius: 20px;
        white-space: nowrap;
      }
      .waiting-icon {
        display: inline-block;
        animation: waitFloat 3.5s ease-in-out infinite;
        opacity: 0.5;
      }
      @keyframes waitFloat {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.45;
        }
        50% {
          transform: translateY(-3px) scale(1.06);
          opacity: 0.65;
        }
      }
      .hero-cards-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
      @media (max-width: 768px) {
        .hero-cards-grid {
          grid-template-columns: 1fr;
        }
        .hero-card .hc-day {
          font-size: 2.6rem;
        }
        .hero-card .hc-temp {
          font-size: 2rem;
        }
        .hero-card .hc-icon {
          font-size: 2.2rem;
        }
      }

      /* COUNTDOWN SECTION */
      .countdown-section {
        margin-top: 48px;
        padding-top: 40px;
        border-top: 1px solid rgba(201, 168, 76, 0.1);
      }
      .countdown-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 14px;
        align-items: start;
      }
      .countdown-card {
        position: relative;
        background: rgba(22, 16, 10, 0.68);
        border: 1px solid rgba(201, 168, 76, 0.12);
        border-radius: 14px;
        overflow: hidden;
        transition:
          transform 0.28s cubic-bezier(0.25, 0.1, 0.25, 1),
          border-color 0.28s,
          box-shadow 0.28s;
        display: flex;
        flex-direction: column;
      }
      .countdown-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;

      function AudioPlayer() {
        const {
          isPlaying,
          setPlaying,
          currentTrack,
          nextTrack,
          volume,
          setVolume,
          isMuted,
          setIsMuted,
        } = useContext(AudioContext);
        const t = useTranslation();
        const [showToast, setShowToast] = useState(false);
        const prevTrack = useRef(currentTrack);

        useEffect(() => {
          if (isPlaying && (currentTrack !== prevTrack.current || !showToast)) {
            setShowToast(false);
            const tId = setTimeout(() => setShowToast(true), 50);
            prevTrack.current = currentTrack;
            const hideId = setTimeout(() => setShowToast(false), 5000);
            return () => {
              clearTimeout(tId);
              clearTimeout(hideId);
            };
          }
        }, [currentTrack, isPlaying]);

        const btnBase =
          "bg-transparent border-none text-[var(--gold)] cursor-pointer flex items-center justify-center p-1 transition-transform hover:scale-105 active:scale-95";

        return h(
          React.Fragment,
          null,
          h(
            "div",
            {
              className:
                "fixed bottom-4 left-4 z-[1000] flex items-center gap-2 md:gap-3 bg-[rgba(22,16,10,0.85)] border border-[rgba(201,168,76,0.3)] rounded-full px-3 md:px-5 py-2 backdrop-blur-xl shadow-2xl transition-all duration-300",
            },
            h(
              "button",
              {
                onClick: () => setPlaying(!isPlaying),
                className:
                  "bg-[var(--gold)] text-[#111] w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center p-0 shadow-lg hover:bg-[var(--gold-light)] transition-colors",
              },
              isPlaying
                ? h(Icon, { name: "pause", size: 20 })
                : h(Icon, { name: "play", size: 20 }),
            ),
            h(
              "div",
              {
                className:
                  "flex flex-col min-w-[80px] md:min-w-[120px] max-w-[140px]",
              },
              h(
                "span",
                {
                  className:
                    "text-[0.5rem] text-[var(--gold)] uppercase tracking-widest",
                },
                t.nowPlaying,
              ),
              h(
                "span",
                {
                  className:
                    "text-[0.65rem] md:text-xs font-bold text-[var(--cream)] truncate",
                },
                PLAYLIST[currentTrack].name,
              ),
            ),
            h("div", {
              className:
                "hidden md:block w-px h-6 bg-[rgba(201,168,76,0.2)] mx-1",
            }),
            h(
              "div",
              { className: "hidden md:flex items-center gap-1" },
              h(
                "button",
                { onClick: () => setIsMuted(!isMuted), className: btnBase },
                h(Icon, { name: isMuted ? "volOff" : "volOn", size: 18 }),
              ),
              h(
                "button",
                {
                  onClick: () => setVolume(Math.max(0, volume - 0.1)),
                  className: btnBase,
                },
                h(Icon, { name: "minus", size: 16 }),
              ),
              h(
                "div",
                {
                  className:
                    "w-10 h-1 bg-[rgba(201,168,76,0.2)] rounded-full relative overflow-hidden mx-1",
                },
                h("div", {
                  className:
                    "absolute left-0 top-0 bottom-0 bg-[var(--gold)] transition-all",
                  style: { width: `${(isMuted ? 0 : volume) * 100}%` },
                }),
              ),
              h(
                "button",
                {
                  onClick: () => setVolume(Math.min(1, volume + 0.1)),
                  className: btnBase,
                },
                h(Icon, { name: "plus", size: 16 }),
              ),
            ),
            h("div", { className: "w-px h-6 bg-[rgba(201,168,76,0.2)] mx-1" }),
            h(

              h(Icon, { name: "next", size: 18 }),

      /* ═══ HELPERS ═══ */
      function isND(v) {
        return v === "N/D" || v === null || v === undefined;
      }
      function isOutOfRange(f) {
        return isND(f.temp_max) && (f.icono === "❓" || isND(f.icono));
      }

      function SmartIcon({ f, fontSize, color }) {
        const mapping = {
          "☀️": "sunny",
          "🌤️": "partlyCloudy",
          "☁️": "cloudy",
          "🌧️": "rain",
          "⛈️": "storm",
          "🔮": "waiting",
          "🌡️": "meteo",
        };
        const iconName =
          mapping[f.icono] || (isOutOfRange(f) ? "waiting" : "meteo");
        return h(Icon, {
          name: iconName,
          size: fontSize || 24,
          color: color || "currentColor",
        });
      }

      function resolveAnalisis(raw) {
        if (!raw) return { nd: false, text: "" };
        const isWarning =
          raw.includes("⚠️") ||
          raw.includes("no disponibles") ||
          raw.includes("temporalment") ||
          raw.includes("rango");
        if (isWarning)
          return {
            nd: true,
            text: "Fora del rang de 15 dies del model. La previsió s'activarà automàticament a mesura que la data s'acoste.",
          };
        return { nd: false, text: raw };
      }

      /* ═══ COUNTDOWN COMPONENT ═══ */
      const FESTA_START = new Date("2026-04-24T00:00:00");

      function CountdownHero() {
        function getRemaining() {
          const diff = FESTA_START - Date.now();
          if (diff <= 0) return null;
          return {
            dies: Math.floor(diff / (1000 * 60 * 60 * 24)),
            hores: Math.floor((diff / (1000 * 60 * 60)) % 24),
            minuts: Math.floor((diff / (1000 * 60)) % 60),
            segons: Math.floor((diff / 1000) % 60),
          };
        }

        const [rem, setRem] = useState(getRemaining);

        useEffect(() => {
          const id = setInterval(() => setRem(getRemaining()), 1000);
          return () => clearInterval(id);
        }, []);

        if (!rem)
          return h(
            "div",
            { className: "cd-finished" },
            "Les Festes han Començat!",
          );

        const units = [
          { val: rem.dies, label: "Dies" },
          { val: rem.hores, label: "Hores" },
          { val: rem.minuts, label: "Minuts" },
          { val: rem.segons, label: "Segons" },
        ];

        return h(
          "div",
          {
            className: "countdown-hero",
            "aria-label": "Compte arrere per a les festes",
          },
          units.map((u, i) =>
            h(
              React.Fragment,
              { key: u.label },
              h(
                "div",
                { className: "cd-block" },
                h(
                  AnimatePresence,
                  { mode: "popLayout" },
                  h(
                    motion.div,
                    {
                      key: u.val,
                      className: "cd-num",
                      initial: { opacity: 0, y: -12 },
                      animate: { opacity: 1, y: 0 },
                      exit: { opacity: 0, y: 12 },
                      transition: {
                        duration: 0.22,
                        ease: [0.25, 0.1, 0.25, 1],
                      },
                    },
                    String(u.val).padStart(2, "0"),
                  ),
                ),
                h("div", { className: "cd-label" }, u.label),
              ),
              i < units.length - 1 &&
                h("div", { className: "cd-sep", "aria-hidden": true }, ":"),
            ),
          ),
        );
      }

      /* ═══ METEO ═══ */
      function MeteoSection() {
        const t = useTranslation();
        const [meteo, setMeteo] = useState(null);
        const [selectedDay, setSelectedDay] = useState(null);
        const scrollRef = useRef(null);
        const scroll = (amount) => {
          if (scrollRef.current) {
            scrollRef.current.scrollBy({ left: amount, behavior: "smooth" });
          }
        };

        useEffect(() => {
          fetch("./datos.json?v=" + Date.now())
            .then((r) => r.json())
            .then(setMeteo)
            .catch(() => setMeteo(null));
        }, []);

        function getTodayMidnight() {
          const n = new Date();
          return new Date(n.getFullYear(), n.getMonth(), n.getDate());
        }
        function parseDateMidnight(s) {
          const p = s.split("-");
          return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
        }

        const allDays = meteo?.fiestas || [];
        const diesGrans = allDays.filter((f) => {
          const d = parseDateMidnight(f.fecha);
          return d.getDate() >= 24 && d.getDate() <= 27 && d.getMonth() === 3;
        });
        const today = getTodayMidnight();
        const entraetes = allDays.filter((f) => {
          const d = parseDateMidnight(f.fecha);
          return (
            d.getDate() >= 6 &&
            d.getDate() <= 23 &&
            d.getMonth() === 3 &&
            !!ENTRAETES_INFO[f.fecha] &&
            d >= today
          );
        });

        function probColor(prob) {
          if (isND(prob)) return "rgba(201,168,76,.18)";
          if (prob < 25) return "#22c55e";
          if (prob < 50) return "#f59e0b";
          return "#cc0000";
        }
        function parseDia(s) {
          const p = s.split("·");
          return { weekday: (p[0] || "").trim(), event: (p[1] || "").trim() };
        }
        function dayNum(f) {
          return parseDateMidnight(f).getDate();
        }
        function daysUntil(f) {
          const d = Math.ceil(
            (parseDateMidnight(f) - today) / (1000 * 60 * 60 * 24),
          );
          if (d === 0) return t.today;
          if (d === 1) return t.tomorrow;
          return d + t.daysLeft;
        }

        return h(
          "section",
          {
            id: "meteo",
            style: {
              padding: "88px 24px",

              h(

                {

      /* ═══ APP ═══ */
      function App() {
        const [lang, setLang] = useState("ca");
        const [scrolled, setScrolled] = useState(false);
        const [isPlaying, setPlaying] = useState(false);
        const [currentTrack, setCurrentTrack] = useState(0);
        const [volume, setVolume] = useState(1);
        const [isMuted, setIsMuted] = useState(false);
        const audioRef = useRef(null);

        useEffect(() => {
          if (audioRef.current) {
            audioRef.current.volume = isMuted ? 0 : volume;
          }
        }, [volume, isMuted]);

        useEffect(() => {
          if (!audioRef.current) {
            audioRef.current = new Audio(PLAYLIST[currentTrack].file);
            audioRef.current.loop = false;
            audioRef.current.addEventListener("ended", () => {
              setCurrentTrack((c) => (c + 1) % PLAYLIST.length);
            });
          }
        }, []);

        useEffect(() => {
          if (audioRef.current) {
            audioRef.current.src = PLAYLIST[currentTrack].file;
            if (isPlaying) {
              audioRef.current.play().catch(() => setPlaying(false));
            }
          }
        }, [currentTrack]);

        useEffect(() => {
          if (audioRef.current) {
            if (isPlaying)
              audioRef.current.play().catch(() => setPlaying(false));
            else audioRef.current.pause();
          }
        }, [isPlaying]);

        const nextTrack = () =>
          setCurrentTrack((c) => (c + 1) % PLAYLIST.length);

        useEffect(() => {
          const fn = () => setScrolled(window.scrollY > 60);
          window.addEventListener("scroll", fn, { passive: true });
          return () => window.removeEventListener("scroll", fn);
        }, []);
        const div = h("div", { className: "gold-div" });
        return h(
          LanguageContext.Provider,
          { value: { lang, setLang } },
          h(
            AudioContext.Provider,
            {
              value: {
                isPlaying,
                setPlaying,
                currentTrack,
                nextTrack,
                volume,
                setVolume,
                isMuted,
                setIsMuted,
                audioRef,
              },
            },
            h(
              React.Fragment,
              null,
              h(AudioPlayer),
              h(Navbar, { scrolled }),
              h(
                "main",
                { className: "max-w-[1600px] mx-auto overflow-x-hidden" },
                h(HeroSection),
                div,
                h(MeteoSection),
                div,
                h(TimelineSection),
                div,
                h(FilaesSection),
                div,
                h(CartelSection),
                div,
                h(GallerySection),
              ),
              h(Footer),
            ),
          ),
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
